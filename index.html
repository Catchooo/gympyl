<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School site</title>
    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #6c5ce7;
            --taskbar-bg: rgba(0, 0, 0, 0.9);
            --text-light: #ffffff;
            --main-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --color-passed: #95a5a6; 
            --color-future: #2ecc71; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--main-font); }

        body {
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .taskbar {
            width: 60px; background: var(--taskbar-bg); backdrop-filter: blur(10px); height: 100%;
            display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 20px;
            z-index: 1000; border-right: 1px solid rgba(255,255,255,0.1);
        }

        .task-icon { width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 22px; color: white; transition: 0.2s; }
        .task-icon.active { background: rgba(255,255,255,0.2); border-left: 3px solid var(--win-accent); }

        .desktop-greeting {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; text-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; width: 90%;
            transition: 0.4s; pointer-events: none;
        }
        body.window-open .desktop-greeting { opacity: 0; }
        .desktop-greeting h1 { font-size: clamp(28px, 8vw, 64px); font-weight: 200; }

        .window-overlay { position: fixed; top: 0; left: 60px; bottom: 0; right: 0; background: rgba(0,0,0,0.3); display: none; z-index: 500; }
        .window-content { width: 100%; max-width: 420px; background: #f2f2f2; height: 100%; transform: translateX(-100%); transition: 0.4s; display: flex; flex-direction: column; }
        .window-content.active { transform: translateX(0); }
        .window-header { padding: 15px 20px; background: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .window-body { flex: 1; overflow-y: auto; padding: 15px; }

        .lesson-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #ccc; }
        .lesson-future { border-left-color: var(--color-future); }
        .lesson-passed { border-left-color: var(--color-passed); opacity: 0.7; }
        .lesson-current { border-left-color: var(--win-accent); transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .timer-big { font-size: clamp(48px, 15vw, 72px); text-align: center; font-weight: 100; color: var(--win-accent); margin: 30px 0 10px; }
        .signature { position: absolute; bottom: 15px; right: 20px; color: rgba(255, 255, 255, 0.4); font-size: 13px; }

        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .taskbar { width: 100%; height: 65px; flex-direction: row; justify-content: space-around; padding: 0; border-top: 1px solid rgba(255,255,255,0.1); }
            .window-overlay { left: 0; bottom: 65px; }
            .window-content { max-width: 100%; }
        }
    </style>
</head>
<body id="main-body">

    <div class="taskbar">
        <div class="task-icon" id="icon-timer" title="До дзвінка" onclick="openApp('timer')">🔔</div>
        <div class="task-icon" id="icon-tomorrow" title="На завтра" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="icon-full" title="Тиждень" onclick="openApp('full')">📚</div>
        <div class="task-icon" style="margin-top:auto; opacity:0.3;" onclick="login()">🔑</div>
    </div>

    <div class="desktop-greeting">
        <h1>Пилиповицька Гімназія</h1> 
        <p>Personal lesson list</p>
    </div>

    <div class="signature">Byme</div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title">Додаток</h2>
                <span style="cursor:pointer; font-size:24px;" onclick="closeApp()">✕</span>
            </div>
            <div class="window-body" id="win-body"></div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "br.m.airways@gmail.com";
        let isAdmin = localStorage.getItem('school_admin') === 'true';

        const schedule = {
            1: { lessons: ["Українська мова", "Математика", "Математика", "Укр. літ.", "Мистецтво", "Географія"], name: "Понеділок" },
            2: { lessons: ["Фізкультура", "Англійська", "Історія", "Англійська", "Зарубіжна", "Інформатика"], name: "Вівторок" },
            3: { lessons: ["Українська мова", "Укр. літ.", "Технології", "Технології", "Математика", "Музика"], name: "Середа" },
            4: { lessons: ["Англійська", "Українська", "Українська", "Зарубіжна", "Фізкультура", "Англійська"], name: "Четвер" },
            5: { lessons: ["Основи здоров'я", "Математика", "Природа", "Історія", "Математика"], name: "П'ятниця" }
        };

        const bells = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:25", e: "11:10"}, {s: "11:30", e: "12:15"},
            {s: "12:25", e: "13:10"}, {s: "13:20", e: "14:05"},
            {s: "14:15", e: "15:00"}
        ];

        function login() {
            const mail = prompt("Введіть email:");
            if(mail === ADMIN_EMAIL) { isAdmin = true; localStorage.setItem('school_admin', 'true'); location.reload(); }
        }

        function openApp(app) {
            const overlay = document.getElementById('overlay');
            const win = document.getElementById('win');
            const body = document.getElementById('win-body');
            const title = document.getElementById('win-title');
            
            document.querySelectorAll('.task-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('icon-'+app).classList.add('active');

            overlay.style.display = 'flex';
            setTimeout(() => win.classList.add('active'), 10);
            document.getElementById('main-body').classList.add('window-open');

            if(app === 'timer') { title.innerText = "Скільки до дзвінка?"; startTimer(); }
            else if(app === 'tomorrow') { 
                title.innerText = "На завтра"; 
                const d = new Date().getDay();
                let nextDay = (d >= 5 || d === 0) ? 1 : d + 1;
                body.innerHTML = renderDay(nextDay, false);
            }
            else { 
                title.innerText = "Тиждень"; 
                let h = ""; for(let i=1; i<=5; i++) h += renderDay(i, false);
                body.innerHTML = h;
            }
        }

        function closeApp() {
            clearInterval(timerTick);
            document.getElementById('win').classList.remove('active');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-body').classList.remove('window-open');
            }, 400);
        }

        function renderDay(dayId, checkStatus) {
            const data = schedule[dayId];
            if(!data) return "";
            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            const isToday = now.getDay() === parseInt(dayId);

            let html = `<h3 style="margin: 15px 0 10px; color: var(--win-accent);">${data.name}</h3>`;
            
            data.lessons.forEach((l, i) => {
                let statusClass = "";
                if(isToday && checkStatus) {
                    const sm = parseInt(bells[i].s.split(':')[0])*60 + parseInt(bells[i].s.split(':')[1]);
                    const em = parseInt(bells[i].e.split(':')[0])*60 + parseInt(bells[i].e.split(':')[1]);
                    if (curMin >= em) statusClass = "lesson-passed";
                    else if (curMin >= sm && curMin < em) statusClass = "lesson-current";
                    else statusClass = "lesson-future";
                }
                const hw = localStorage.getItem('hw_'+l) || "Немає ДЗ";
                html += `<div class="lesson-card ${statusClass}">
                    <strong>${i+1}. ${l}</strong>
                    <div class="hw-area">${isAdmin ? `<input class="hw-input" value="${hw==='Немає ДЗ'?'':hw}" onchange="localStorage.setItem('hw_${l}', this.value)">` : `📝 ${hw}`}</div>
                </div>`;
            });
            return html;
        }

        let timerTick;
        function startTimer() {
            const body = document.getElementById('win-body');
            function update() {
                const now = new Date();
                let today = now.getDay();
                const cur = now.getHours()*60 + now.getMinutes();
                const sec = 60 - now.getSeconds();
                let content = "";

                // Якщо вихідний, просто показуємо розклад на понеділок і кажемо відпочивати
                if (today === 0 || today === 6) {
                    content = `<div style="text-align:center; padding:20px 0;"><h3>Сьогодні вихідний!</h3><p>Уроків немає, відпочивай.</p></div><hr style="margin:20px 0; border:0; border-top:1px solid #ddd;">` + renderDay(1, false);
                } else {
                    let found = false;
                    const lastBell = parseInt(bells[bells.length-1].e.split(':')[0])*60 + parseInt(bells[bells.length-1].e.split(':')[1]);

                    if (cur >= lastBell) {
                        content = `<div style="text-align:center; padding:40px 0;"><h3>Уроків вже немає</h3><p>Відпочивай!</p></div>`;
                    } else {
                        bells.forEach((b, i) => {
                            const sm = parseInt(b.s.split(':')[0])*60 + parseInt(b.s.split(':')[1]);
                            const em = parseInt(b.e.split(':')[0])*60 + parseInt(b.e.split(':')[1]);
                            if(cur >= sm && cur < em) {
                                content = `<div class="timer-big">${em - cur - 1}:${sec < 10 ? '0'+sec : sec}</div><p style="text-align:center">До кінця ${i+1}-го уроку</p>`;
                                found = true;
                            } else if (i < bells.length - 1) {
                                const nextSm = parseInt(bells[i+1].s.split(':')[0])*60 + parseInt(bells[i+1].s.split(':')[1]);
                                if (cur >= em && cur < nextSm) {
                                    content = `<div class="timer-big">${nextSm - cur - 1}:${sec < 10 ? '0'+sec : sec}</div><p style="text-align:center">До кінця перерви</p>`;
                                    found = true;
                                }
                            }
                        });
                        if (!found && cur < parseInt(bells[0].s.split(':')[0])*60 + parseInt(bells[0].s.split(':')[1])) {
                             const fSm = parseInt(bells[0].s.split(':')[0])*60 + parseInt(bells[0].s.split(':')[1]);
                             content = `<div class="timer-big">${fSm - cur - 1}:${sec < 10 ? '0'+sec : sec}</div><p style="text-align:center">До початку занять</p>`;
                             found = true;
                        }
                    }
                    content += `<hr style="margin:20px 0; border:0; border-top:1px solid #ddd;">` + renderDay(today, true);
                }
                body.innerHTML = content;
            }
            update();
            timerTick = setInterval(update, 1000);
        }
    </script>
</body>
</html>
