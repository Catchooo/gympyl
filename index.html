<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пилиповицька Гімназія | Smart Portal</title>
    
    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #6c5ce7;
            --win-accent-active: #2980b9;
            --taskbar-bg: rgba(15, 15, 15, 0.95);
            --text-light: #ffffff;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Кольори статусів уроків */
            --status-passed: #b2bec3;   /* Сірий */
            --status-future: #2ecc71;   /* Зелений */
            --status-current: #3498db;  /* Синій */
            
            --window-bg: #f0f2f5;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: var(--main-font); 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('https://kokl.ua/wp-content/uploads/2025/10/ostriv-epshtejna-scaled.jpg') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
            color: #2d3436;
        }

        /* Панель задач */
        .taskbar {
            width: 75px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 20px;
            z-index: 1000;
            border-right: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .task-icon {
            width: 52px;
            height: 52px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
        }

        .task-icon:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1) translateY(-2px);
        }

        .task-icon.active {
            background: var(--win-accent);
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.5);
        }

        /* Робочий стіл */
        .desktop-greeting {
            position: absolute;
            top: 45%;
            left: 55%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 5;
            width: 80%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        body.window-open .desktop-greeting {
            opacity: 0;
            transform: translate(-50%, -70%) scale(0.9);
            filter: blur(10px);
        }

        .desktop-greeting h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .signature {
            position: absolute;
            bottom: 25px;
            right: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Система Вікон */
        .window-overlay {
            position: fixed;
            top: 0;
            left: 75px;
            bottom: 0;
            right: 0;
            background: rgba(0,0,0,0.2);
            display: none;
            z-index: 500;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .window-content {
            width: 100%;
            max-width: 500px;
            background: var(--window-bg);
            height: 100%;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 50px rgba(0,0,0,0.3);
        }

        .window-content.active { transform: translateX(0); }

        .window-header {
            padding: 20px 25px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e1e4e8;
        }

        .close-btn { font-size: 28px; color: #b2bec3; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: #eb4d4b; }

        .window-body { flex: 1; overflow-y: auto; padding: 20px; }

        /* Картки уроків - СТИЛІЗАЦІЯ СТАТУСІВ */
        .lesson-card {
            background: #ffffff;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 6px solid #dfe6e9; /* Дефолтний колір */
            transition: 0.3s ease;
            position: relative;
        }

        /* 1. ПІШОВ (Сірий) */
        .lesson-card.status-passed {
            border-left-color: var(--status-passed);
            opacity: 0.6;
            background: #f8f9fa;
        }
        .lesson-card.status-passed .lesson-name,
        .lesson-card.status-passed .lesson-time {
            color: #7f8c8d;
        }

        /* 2. ІДЕ (Синій) */
        .lesson-card.status-current {
            border-left-color: var(--status-current);
            background: #ebf5fb;
            transform: scale(1.03);
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.2);
        }
        .lesson-card.status-current .lesson-name {
            color: var(--status-current);
        }

        /* 3. ЩЕ НЕ (Зелений) */
        .lesson-card.status-future {
            border-left-color: var(--status-future);
            background: #eafaf1;
        }
        .lesson-card.status-future .lesson-name {
            color: #27ae60;
        }

        .lesson-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lesson-name { font-weight: 700; color: #2d3436; }
        .lesson-time { font-size: 12px; color: #636e72; font-variant-numeric: tabular-nums; }
        
        .homework-box {
            background: rgba(0,0,0,0.03);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #485460;
            border: 1px dashed #dcdde1;
        }

        /* Таймер */
        .timer-display {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #e1e4e8;
        }

        .timer-big {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }
        
        .timer-status {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        /* AI Чат */
        .chat-wrap { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; }
        
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: bubbleUp 0.3s ease;
        }
        
        @keyframes bubbleUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bubble.ai { align-self: flex-start; background: white; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bubble.user { align-self: flex-end; background: var(--win-accent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 2px 5px rgba(108, 92, 231, 0.2); }

        .chat-controls {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e1e4e8;
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }
        .chat-input:focus { border-color: var(--win-accent); }

        .send-btn {
            background: var(--win-accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { background: var(--win-accent-active); transform: scale(1.05); }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .taskbar { width: 100%; height: 70px; flex-direction: row; justify-content: space-around; padding: 0; }
            .window-overlay { left: 0; bottom: 70px; }
            .window-content { max-width: 100%; border-radius: 20px 20px 0 0; }
            .desktop-greeting h1 { font-size: 2.2rem; }
        }
        
        #ai-status { display: none; padding: 5px 15px; font-size: 12px; color: var(--win-accent); font-weight: 600; text-align: center;}
    </style>
</head>
<body id="app-shell">

    <nav class="taskbar">
        <div class="task-icon" id="btn-timer" onclick="openApp('timer')">🔔</div>
        <div class="task-icon" id="btn-tomorrow" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="btn-full" onclick="openApp('full')">📖</div>
        <div class="task-icon" id="btn-ai" onclick="openApp('ai')">🤖</div>
        <div class="task-icon" style="margin-top:auto; opacity:0.1;" onclick="adminGate()">🔑</div>
    </nav>

    <div class="desktop-greeting">
        <h1 id="school-name">Пилиповицька Гімназія</h1>
        <p id="live-clock"></p>
    </div>

    <div class="signature">Byme</div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win-container" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title">Завантаження...</h2>
                <div class="close-btn" onclick="closeApp()">&times;</div>
            </div>
            <div class="window-body" id="win-render-area"></div>
        </div>
    </div>

    <script>
        // --- КОНФІГУРАЦІЯ АПІ (URL-ПАРАМЕТР) ---
        const urlParams = new URLSearchParams(window.location.search);
        const keyFromUrl = urlParams.get('key');
        if (keyFromUrl) {
            localStorage.setItem('my_ai_key', keyFromUrl);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Динамічні функції для отримання ключа (щоб не було 404)
        const getApiKey = () => localStorage.getItem('my_ai_key') || "";
        const getApiUrl = () => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${getApiKey()}`;
        // --- ДАНІ ---
        const ADMIN_PASS = "br.m.airways@gmail.com";
        let isEditMode = localStorage.getItem('gym_admin') === 'true';

        const schedule = {
            1: { name: "Понеділок", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", lessons: ["Основи здоров'я", "Математика", "Природа", "Історія", "Математика"] }
        };

        const bellTimes = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:30", e: "11:15"}, {s: "11:25", e: "12:10"},
            {s: "12:20", e: "13:05"}, {s: "13:10", e: "13:55"},
            {s: "14:00", e: "14:45"}, {s: "14:50", e: "15:35"}
        ];

        // --- ЛОГІКА ГОДИННИКА ---
        setInterval(() => {
            const n = new Date();
            document.getElementById('live-clock').innerText = n.toLocaleTimeString('uk-UA');
        }, 1000);

        // --- УПРАВЛІННЯ ВІКНАМИ ---
        function openApp(id) {
            const area = document.getElementById('win-render-area');
            const title = document.getElementById('win-title');
            
            document.querySelectorAll('.task-icon').forEach(el => el.classList.remove('active'));
            const btn = document.getElementById('btn-'+id);
            if(btn) btn.classList.add('active');
            
            if(window.appInterval) clearInterval(window.appInterval);

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('app-shell').classList.add('window-open');
            setTimeout(() => document.getElementById('win-container').classList.add('active'), 10);

            switch(id) {
                case 'timer':
                    title.innerText = "Поточний статус";
                    startTimerModule(area);
                    break;
                case 'tomorrow':
                    title.innerText = "На завтра";
                    let d = new Date().getDay();
                    let next = (d >= 5 || d === 0) ? 1 : d + 1;
                    area.innerHTML = renderDayUI(next, false);
                    break;
                case 'full':
                    title.innerText = "Повний тиждень";
                    area.innerHTML = [1,2,3,4,5].map(i => renderDayUI(i, false)).join('');
                    break;
                case 'ai':
                    title.innerText = "AI Асистент";
                    launchChat(area);
                    break;
            }
        }

        function closeApp() {
            document.getElementById('win-container').classList.remove('active');
            document.getElementById('app-shell').classList.remove('window-open');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                if(window.appInterval) clearInterval(window.appInterval);
            }, 400);
        }

        // --- РЕНДЕР РОЗКЛАДУ З КОЛЬОРАМИ ---
        function renderDayUI(dayIdx, isLiveUpdate) {
            const data = schedule[dayIdx];
            if(!data) return ''; 
            
            const now = new Date();
            const nowTotalMin = now.getHours() * 60 + now.getMinutes();

            let html = `<h3 style="margin: 20px 0 10px; color: var(--win-accent); border-bottom: 2px solid #e1e4e8; padding-bottom:5px;">${data.name}</h3>`;
            
            data.lessons.forEach((name, i) => {
                let statusClass = "status-future"; // Дефолт: Зелений (ще буде)
                
                if(isLiveUpdate && bellTimes[i]) {
                    const [sh, sm] = bellTimes[i].s.split(':').map(Number);
                    const [eh, em] = bellTimes[i].e.split(':').map(Number);
                    const sTotal = sh * 60 + sm;
                    const eTotal = eh * 60 + em;

                    if(nowTotalMin >= eTotal) {
                        statusClass = "status-passed"; // Сірий (пройшов)
                    } else if(nowTotalMin >= sTotal && nowTotalMin < eTotal) {
                        statusClass = "status-current"; // Синій (іде)
                    }
                }

                const savedHW = localStorage.getItem('hw_' + name) || "Не вказано";
                html += `
                <div class="lesson-card ${statusClass}">
                    <div class="lesson-info">
                        <span class="lesson-name">${i+1}. ${name}</span>
                        <span class="lesson-time">${bellTimes[i]?.s || '--'} - ${bellTimes[i]?.e || '--'}</span>
                    </div>
                    <div class="homework-box">
                        ${isEditMode ? `<input type="text" value="${savedHW==='Не вказано'?'':savedHW}" onchange="localStorage.setItem('hw_${name}', this.value)" style="width:100%; border:none; background:transparent; outline:none; color:#485460;">` : '📝 ' + savedHW}
                    </div>
                </div>`;
            });
            return html;
        }

        // --- МОДУЛЬ ТАЙМЕРА (ФІКС ВИХІДНИХ) ---
        function startTimerModule(container) {
            const update = () => {
                const now = new Date();
                const day = now.getDay(); 
                
                // Якщо неділя (0) або субота (6) -> беремо розклад понеділка (1)
                const logicalDay = (day === 0 || day === 6) ? 1 : day;

                const curTotalSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                let found = false;
                let timerHeaderHtml = "";

                // Проходимо по всіх дзвінках
                for(let i=0; i < bellTimes.length; i++) {
                    const sArr = bellTimes[i].s.split(':').map(Number);
                    const eArr = bellTimes[i].e.split(':').map(Number);
                    const sTotal = sArr[0]*3600 + sArr[1]*60;
                    const eTotal = eArr[0]*3600 + eArr[1]*60;

                    if(curTotalSec >= sTotal && curTotalSec < eTotal) {
                        const remainSec = eTotal - curTotalSec;
                        timerHeaderHtml = renderTimerUI(`Триває ${i+1}-й урок`, remainSec, "До дзвінка", "#3498db");
                        found = true; 
                        break;
                    } else if (i < bellTimes.length - 1) {
                        const nsArr = bellTimes[i+1].s.split(':').map(Number);
                        const nsTotal = nsArr[0]*3600 + nsArr[1]*60;
                        
                        if(curTotalSec >= eTotal && curTotalSec < nsTotal) {
                            const remainSec = nsTotal - curTotalSec;
                            timerHeaderHtml = renderTimerUI("Перерва", remainSec, `До ${i+2}-го уроку`, "#2ecc71");
                            found = true; 
                            break;
                        }
                    }
                }

                if(!found) {
                    const firstLessonTotal = 8*3600 + 30*60;
                    if (curTotalSec < firstLessonTotal) {
                        const remainSec = firstLessonTotal - curTotalSec;
                        timerHeaderHtml = renderTimerUI("Ранок", remainSec, "До 1-го уроку", "#f39c12");
                    } else {
                        timerHeaderHtml = renderTimerUI("Навчання завершено", null, "До завтра", "#7f8c8d");
                    }
                }

                container.innerHTML = timerHeaderHtml + renderDayUI(logicalDay, true);
            };

            function renderTimerUI(status, seconds, subtext, color) {
                let timeStr = "--:--";
                if (seconds !== null) {
                    const h = Math.floor(seconds / 3600);
                    const m = Math.floor((seconds % 3600) / 60);
                    const s = seconds % 60;
                    timeStr = (h > 0 ? h + ":" : "") + m.toString().padStart(2,'0') + ":" + s.toString().padStart(2,'0');
                }
                return `
                    <div class="timer-display">
                        <div class="timer-status">${status}</div>
                        <div class="timer-big" style="color:${color}">${timeStr}</div>
                        <div style="color:${color}; font-weight:600; font-size:13px; margin-top:5px;">${subtext}</div>
                    </div>`;
            }

            update();
            window.appInterval = setInterval(update, 1000);
        }

        // --- AI LOGIC (ФІКС 404) ---
        function launchChat(container) {
            container.innerHTML = `
                <div class="chat-wrap">
                    <div class="chat-messages" id="chat-flow"><div class="bubble ai">Вітаю! Я - розумний ШІ від Google. Можеш запитати мене про будь - що: від квантового комп'ютера, до закатки в погрибі.</div></div>
                    <div id="ai-status">ШІ думає...</div>
                    <div class="chat-controls">
                        <input type="text" class="chat-input" id="ai-input" placeholder="Які уроки у середу?">
                        <button class="send-btn" onclick="askAI()">➤</button>
                    </div>
                </div>`;
            setTimeout(() => document.getElementById('ai-input').focus(), 100);
            document.getElementById('ai-input').addEventListener('keypress', e => e.key==='Enter' && askAI());
        }

        async function askAI() {
            const inp = document.getElementById('ai-input');
            const text = inp.value.trim();
            if(!text) return;
            
            // Жорстка перевірка ключа ПЕРЕД запитом
            const apiKey = getApiKey();
            if(!apiKey) {
                appendBubble("⚠️ Ключ не знайдено!", 'ai');
                return; 
            }
            appendBubble(text, 'user');
            inp.value = '';
            const status = document.getElementById('ai-status');
            status.style.display = 'block';

            const context = `Ти асистент Пилиповицької гімназії. Розклад уроків: ${JSON.stringify(schedule)}. Дзвінки: 1(08:30-09:15), 2(09:25-10:10), 3(10:30-11:15), 4(11:25-12:10), 5(12:20-13:05), 6(13:10-13:55), 7(14:00-14:45), 8(14:50-15:35). Сьогодні ${new Date().toLocaleDateString('uk-UA',{weekday:'long'})}. Відповідай українською мовою, дуже коротко. Запит: ${text}`;

            try {
                const res = await fetch(getApiUrl(), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
                });
                
                const data = await res.json();
                status.style.display = 'none';
                
                if (data.error) {
                    appendBubble("🔌 Помилка API: " + data.error.message, 'ai');
                    return;
                }
                
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "🔌 Помилка: Сервер не надав відповіді.";
                appendBubble(reply, 'ai');
            } catch(e) {
                status.style.display = 'none';
                appendBubble("⚠️ Помилка з'єднання.", 'ai');
            }
        }

        function appendBubble(msg, role) {
            const flow = document.getElementById('chat-flow');
            if(!flow) return;
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerHTML = msg.replace(/\n/g, '<br>');
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        // --- АДМІНКА ТА НАЛАШТУВАННЯ КЛЮЧА ---
        function adminGate() {
            const p = prompt("Адмін-пароль АБО новий API Key (починається з AIza...):");
            if(!p) return;

            if(p === ADMIN_PASS) {
                isEditMode = true;
                localStorage.setItem('gym_admin', 'true');
                alert("Режим редагування ДЗ увімкнено.");
                location.reload();
            } else if (p.startsWith("AIza")) {
                localStorage.setItem('my_ai_key', p);
                alert("API Key ШІ успішно збережено!");
                location.reload();
