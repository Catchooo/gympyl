<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Розклад Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent: #6c5ce7;
            --text-dark: #2d3436;
            --secondary: #a29bfe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            overflow: hidden;
        }

        /* Анімований Хедер */
        header {
            position: fixed;
            top: 40px;
            right: 20px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            color: white;
            text-align: right;
        }

        header.shifted {
            transform: translateX(150%); /* Відлітає вправо */
        }

        .app-container { width: 100%; max-width: 400px; padding: 20px; z-index: 5; }
        
        .menu-btn {
            background: var(--card-bg);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-btn:active { transform: scale(0.95); }
        .btn-bell { background: #ffeaa7; color: #d35400; }

        /* Вікна (Sheets) */
        #schedule-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }

        .schedule-sheet {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: 0.4s ease-out;
        }

        .schedule-sheet.active { transform: translateY(0); }

        .close-btn {
            background: #eee; border: none; width: 35px; height: 35px;
            border-radius: 50%; float: right; cursor: pointer;
        }

        /* Стилі уроків та ДЗ */
        .day-block { margin-bottom: 25px; }
        .day-title { font-size: 20px; color: var(--accent); border-bottom: 2px solid #f0f0f0; margin-bottom: 12px; }
        
        .lesson { padding: 12px 0; border-bottom: 1px solid #f1f1f1; position: relative; }
        .lesson-info { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        
        .hw-display {
            font-size: 13px; color: #636e72; font-style: italic; margin-top: 4px;
            display: block; cursor: pointer; padding: 4px; border-radius: 4px;
        }
        .hw-display:hover { background: #f8f9fa; }

        .hw-edit-input {
            width: 100%; border: 1px solid var(--secondary); border-radius: 8px;
            padding: 8px; font-size: 13px; display: none; margin-top: 5px;
        }

        /* Стиль таймера */
        .timer-display {
            text-align: center; padding: 20px;
        }
        .timer-time { font-size: 48px; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .timer-sub { color: #636e72; font-size: 14px; }

    </style>
</head>
<body>

    <header id="main-header">
        <h2 style="font-weight: 300;">Мій Простір</h2>
        <p style="font-size: 12px; opacity: 0.8;">Версія 2.0</p>
    </header>

    <div class="app-container">
        <h1 style="color: white; text-align: center; margin-bottom: 30px; font-weight: 300;">Навчальний День</h1>
        
        <button class="menu-btn btn-bell" onclick="openBellTimer()">
            🔔 Скільки до дзвінка?
        </button>

        <button class="menu-btn" onclick="showTomorrow()">
            📅 Розклад на завтра
        </button>
        
        <button class="menu-btn" onclick="showFull()">
            📚 Повний розклад
        </button>
    </div>

    <div id="schedule-overlay" onclick="closeSchedule()">
        <div class="schedule-sheet" id="sheet" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeSchedule()">✕</button>
            <div id="schedule-content"></div>
        </div>
    </div>

    <script>
        const bellSchedule = [
            { start: "08:30", end: "09:15" }, { start: "09:25", end: "10:10" },
            { start: "10:25", end: "11:10" }, { start: "11:30", end: "12:15" },
            { start: "12:25", end: "13:10" }, { start: "13:20", end: "14:05" },
            { start: "14:15", end: "15:00" }
        ];

        const scheduleData = {
            1: { name: "Понеділок", icon: "🗓️", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", icon: "🗓️", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", icon: "🗓️", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", icon: "🗓️", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", icon: "🗓️", lessons: ["Основи здоров'я", "Основи здоров’я", "Математика", "Природа", "Історія", "Математика"] }
        };

        // --- ФУНКЦІЇ ДЛЯ ДЗ ---
        function getHW(subject) {
            return localStorage.getItem('hw_' + subject) || "Натисніть, щоб додати ДЗ";
        }

        function editHW(el, subject) {
            const display = el;
            const input = el.nextElementSibling;
            display.style.display = 'none';
            input.style.display = 'block';
            input.focus();
            
            input.onblur = () => {
                const val = input.value.trim() || "Натисніть, щоб додати ДЗ";
                localStorage.setItem('hw_' + subject, val);
                display.innerText = (val === "Натисніть, щоб додати ДЗ") ? val : "📝 " + val;
                display.style.display = 'block';
                input.style.display = 'none';
            };
        }

        // --- ТАЙМЕР ДЗВІНКІВ ---
        let timerInterval;

        function updateTimerUI() {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const currentSec = now.getSeconds();
            let content = "";

            for (let i = 0; i < bellSchedule.length; i++) {
                const s = bellSchedule[i].start.split(':').map(Number);
                const e = bellSchedule[i].end.split(':').map(Number);
                const sMin = s[0] * 60 + s[1];
                const eMin = e[0] * 60 + e[1];

                if (currentTime >= sMin && currentTime < eMin) {
                    let remMin = eMin - currentTime - 1;
                    let remSec = 60 - currentSec;
                    content = `<div class="timer-display">
                        <div class="timer-sub">Зараз ${i+1}-й урок</div>
                        <div class="timer-time">${remMin}:${remSec < 10 ? '0'+remSec : remSec}</div>
                        <div class="timer-sub">до кінця уроку</div>
                    </div>`;
                    break;
                } else if (i < bellSchedule.length - 1) {
                    const nextS = bellSchedule[i+1].start.split(':').map(Number);
                    const nextSMin = nextS[0] * 60 + nextS[1];
                    if (currentTime >= eMin && currentTime < nextSMin) {
                        let remMin = nextSMin - currentTime - 1;
                        let remSec = 60 - currentSec;
                        content = `<div class="timer-display">
                            <div class="timer-sub">Зараз перерва 🍎</div>
                            <div class="timer-time">${remMin}:${remSec < 10 ? '0'+remSec : remSec}</div>
                            <div class="timer-sub">до ${i+2}-го уроку</div>
                        </div>`;
                        break;
                    }
                }
            }
            if(!content) content = "<div class='timer-display'>Уроки закінчились! 🎉</div>";
            document.getElementById('schedule-content').innerHTML = content;
        }

        function openBellTimer() {
            openSheet("");
            updateTimerUI();
            timerInterval = setInterval(updateTimerUI, 1000);
        }

        // --- УПРАВЛІННЯ ВІКНАМИ ---
        function openSheet(content) {
            document.getElementById('schedule-content').innerHTML = content;
            document.getElementById('main-header').classList.add('shifted');
            const overlay = document.getElementById('schedule-overlay');
            const sheet = document.getElementById('sheet');
            overlay.style.display = 'flex';
            setTimeout(() => sheet.classList.add('active'), 10);
        }

        function closeSchedule() {
            clearInterval(timerInterval);
            document.getElementById('main-header').classList.remove('shifted');
            const sheet = document.getElementById('sheet');
            sheet.classList.remove('active');
            setTimeout(() => { document.getElementById('schedule-overlay').style.display = 'none'; }, 400);
        }

        function renderDay(dayId) {
            const day = scheduleData[dayId];
            if (!day) return '';
            let html = `<div class="day-block"><div class="day-title">${day.icon} ${day.name}</div>`;
            day.lessons.forEach((lesson, index) => {
                const hw = getHW(lesson);
                html += `
                    <div class="lesson">
                        <div class="lesson-info">
                            <span style="color:#b2bec3">${index + 1}.</span> ${lesson}
                        </div>
                        <span class="hw-display" onclick="editHW(this, '${lesson}')">${hw === "Натисніть, щоб додати ДЗ" ? hw : '📝 ' + hw}</span>
                        <input type="text" class="hw-edit-input" value="${hw === "Натисніть, щоб додати ДЗ" ? '' : hw}">
                    </div>`;
            });
            return html + `</div>`;
        }

        function showFull() {
            let fullHtml = '<h3>Повний розклад</h3><br>';
            for(let i = 1; i <= 5; i++) fullHtml += renderDay(i);
            openSheet(fullHtml);
        }

        function showTomorrow() {
            const now = new Date();
            let today = now.getDay();
            let tomorrow = (today >= 5 || today === 0) ? 1 : today + 1;
            openSheet(renderDay(tomorrow));
        }
    </script>
</body>
</html>
