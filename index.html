<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Розклад Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent: #6c5ce7;
            --text-dark: #2d3436;
            --secondary: #a29bfe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            overflow: hidden;
        }

        .app-container { 
            width: 100%; 
            max-width: 400px; 
            padding: 20px; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Клас для зсуву всіх кнопок вправо */
        .app-container.shifted {
            transform: translateX(120%);
        }

        h1 { color: white; text-align: center; margin-bottom: 30px; font-weight: 300; }

        .menu-btn {
            background: var(--card-bg);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-btn:active { transform: scale(0.95); }
        .btn-bell { background: #ffeaa7; color: #d35400; }

        #schedule-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }

        .schedule-sheet {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .schedule-sheet.active { transform: translateY(0); }

        .close-btn {
            background: #eee; border: none; width: 35px; height: 35px;
            border-radius: 50%; float: right; cursor: pointer; font-size: 18px;
        }

        .day-block { margin-bottom: 25px; }
        .day-title { font-size: 20px; color: var(--accent); border-bottom: 2px solid #f0f0f0; margin-bottom: 12px; }
        
        .lesson { padding: 12px 0; border-bottom: 1px solid #f1f1f1; }
        .hw-text { font-size: 13px; color: #636e72; font-style: italic; display: block; margin-top: 5px; }
        
        .hw-input {
            width: 100%; border: 1px dashed var(--secondary); border-radius: 8px;
            padding: 8px; font-size: 13px; margin-top: 8px; display: none;
        }

        .timer-time { font-size: 50px; font-weight: bold; color: var(--accent); margin: 15px 0; text-align: center; }
        
        .admin-login {
            position: fixed; bottom: 10px; left: 10px; color: white; 
            font-size: 10px; opacity: 0.3; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-menu">
        <h1>Мій Розклад</h1>
        
        <button class="menu-btn btn-bell" onclick="openBellTimer()">
            🔔 Скільки до дзвінка?
        </button>

        <button class="menu-btn" onclick="showTomorrow()">
            📅 Розклад на завтра
        </button>
        
        <button class="menu-btn" onclick="showFull()">
            📚 Повний розклад
        </button>
    </div>

    <div id="schedule-overlay" onclick="closeSchedule()">
        <div class="schedule-sheet" id="sheet" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeSchedule()">✕</button>
            <div id="schedule-content"></div>
        </div>
    </div>

    <div class="admin-login" onclick="loginAdmin()">Admin Login</div>

    <script>
        const bellSchedule = [
            { start: "08:30", end: "09:15" }, { start: "09:25", end: "10:10" },
            { start: "10:25", end: "11:10" }, { start: "11:30", end: "12:15" },
            { start: "12:25", end: "13:10" }, { start: "13:20", end: "14:05" },
            { start: "14:15", end: "15:00" }
        ];

        const scheduleData = {
            1: { name: "Понеділок", icon: "🚀", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", icon: "⚡", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", icon: "💎", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", icon: "🌟", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", icon: "🎉", lessons: ["Основи здоров'я", "Основи здоров’я", "Математика", "Природа", "Історія", "Математика"] }
        };

        let isAdmin = false;
        const ADMIN_EMAIL = "br.m.airways@gmail.com"; // ЗМІНІТЬ НА ВЛАСНУ ПОШТУ

        function loginAdmin() {
            const email = prompt("Введіть email для доступу:");
            if (email === ADMIN_EMAIL) {
                isAdmin = true;
                alert("Доступ дозволено! Тепер ви можете редагувати ДЗ.");
            } else {
                alert("Доступ заборонено.");
            }
        }

        // --- ТАЙМЕР ---
        let timerInterval;
        function updateTimer() {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const sec = now.getSeconds();
            let found = false;

            for (let i = 0; i < bellSchedule.length; i++) {
                const s = bellSchedule[i].start.split(':').map(Number);
                const e = bellSchedule[i].end.split(':').map(Number);
                const sMin = s[0] * 60 + s[1];
                const eMin = e[0] * 60 + e[1];

                if (currentTime >= sMin && currentTime < eMin) {
                    const remMin = eMin - currentTime - 1;
                    const remSec = 60 - sec;
                    document.getElementById('timer-val').innerText = `${remMin}:${remSec < 10 ? '0'+remSec : remSec}`;
                    found = true; break;
                } else if (i < bellSchedule.length - 1) {
                    const nextS = bellSchedule[i+1].start.split(':').map(Number);
                    const nextSMin = nextS[0] * 60 + nextS[1];
                    if (currentTime >= eMin && currentTime < nextSMin) {
                        const remMin = nextSMin - currentTime - 1;
                        const remSec = 60 - sec;
                        document.getElementById('timer-val').innerText = `${remMin}:${remSec < 10 ? '0'+remSec : remSec}`;
                        document.getElementById('timer-status').innerText = "До кінця перерви";
                        found = true; break;
                    }
                }
            }
            if(!found) document.getElementById('schedule-content').innerHTML = "<h3>Уроки закінчились! 😴</h3>";
        }

        function openBellTimer() {
            openSheet(`<h3>Час до дзвінка</h3><div id="timer-status" style="text-align:center; color:#636e72;">До кінця уроку</div><div class="timer-time" id="timer-val">00:00</div>`);
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        // --- УПРАВЛІННЯ ІНТЕРФЕЙСОМ ---
        function openSheet(content) {
            document.getElementById('schedule-content').innerHTML = content;
            document.getElementById('main-menu').classList.add('shifted'); // Зсуваємо кнопки
            const overlay = document.getElementById('schedule-overlay');
            const sheet = document.getElementById('sheet');
            overlay.style.display = 'flex';
            setTimeout(() => sheet.classList.add('active'), 50);
        }

        function closeSchedule() {
            clearInterval(timerInterval);
            document.getElementById('main-menu').classList.remove('shifted'); // Повертаємо кнопки
            const sheet = document.getElementById('sheet');
            sheet.classList.remove('active');
            setTimeout(() => { document.getElementById('schedule-overlay').style.display = 'none'; }, 400);
        }

        function renderDay(dayId) {
            const day = scheduleData[dayId];
            let html = `<div class="day-block"><div class="day-title">${day.icon} ${day.name}</div>`;
            day.lessons.forEach((lesson, index) => {
                const hw = localStorage.getItem('hw_' + lesson) || "ДЗ не вказано";
                html += `
                    <div class="lesson">
                        <strong>${index + 1}. ${lesson}</strong>
                        <span class="hw-text">📝 ${hw}</span>
                        <input type="text" class="hw-input" style="${isAdmin ? 'display:block' : ''}" 
                               placeholder="Змінити ДЗ..." onchange="localStorage.setItem('hw_${lesson}', this.value)" value="${hw === 'ДЗ не вказано' ? '' : hw}">
                    </div>`;
            });
            return html + `</div>`;
        }

        function showFull() {
            let h = '<h2>Повний розклад</h2><br>';
            for(let i=1; i<=5; i++) h += renderDay(i);
            openSheet(h);
        }

        function showTomorrow() {
            const d = new Date().getDay();
            const tomorrow = (d >= 5 || d === 0) ? 1 : d + 1;
            openSheet(renderDay(tomorrow));
        }
    </script>
</body>
</html>
