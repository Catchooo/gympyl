<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School site</title>
    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #6c5ce7;
            --taskbar-bg: rgba(0, 0, 0, 0.9);
            --text-light: #ffffff;
            --main-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--main-font); }

        body {
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- ПАНЕЛЬ ЗАВДАНЬ (Адаптивна) --- */
        .taskbar {
            width: 60px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(10px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 20px;
            z-index: 1000;
            border-right: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .task-icon {
            width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 4px; cursor: pointer; transition: 0.2s;
            font-size: 22px; color: white;
        }

        .task-icon:hover { background: rgba(255,255,255,0.1); }
        .task-icon.active { background: rgba(255,255,255,0.2); border-left: 3px solid var(--win-accent); }

        /* --- ГОЛОВНИЙ ТЕКСТ (clamp для розміру) --- */
        .desktop-greeting {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10; width: 90%;
            pointer-events: none; transition: 0.4s;
        }

        body.window-open .desktop-greeting { opacity: 0; transform: translate(-50%, -60%); }

        .desktop-greeting h1 { 
            font-size: clamp(28px, 8vw, 64px); 
            font-weight: 200; letter-spacing: -1px; 
        }
        .desktop-greeting p { font-size: clamp(14px, 4vw, 18px); opacity: 0.8; }

        .signature {
            position: absolute; bottom: 15px; right: 20px;
            color: rgba(255, 255, 255, 0.4); font-size: 13px; z-index: 5;
        }

        /* --- ВІКНА (Адаптивні) --- */
        .window-overlay {
            position: fixed;
            top: 0; left: 60px; bottom: 0; right: 0;
            background: rgba(0,0,0,0.3); display: none; z-index: 500;
        }

        .window-content {
            width: 100%; max-width: 420px;
            background: #f2f2f2; height: 100%;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            transform: translateX(-100%);
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex; flex-direction: column;
        }

        .window-content.active { transform: translateX(0); }
        .window-header { padding: 15px 20px; background: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .window-body { flex: 1; overflow-y: auto; padding: 15px; }

        .lesson-card {
            background: white; padding: 15px; margin-bottom: 10px;
            border-radius: 8px; border-left: 4px solid var(--win-accent);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .hw-area { margin-top: 8px; font-size: 13px; color: #555; padding: 8px; background: #f9f9f9; border-radius: 4px; }
        .hw-input { width: 100%; padding: 8px; border: 1px solid #ccc; margin-top: 5px; }

        /* --- МОБІЛЬНА ВЕРСІЯ (Медіа-запити) --- */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; } /* Панель вниз */
            
            .taskbar {
                width: 100%; height: 65px;
                flex-direction: row; justify-content: space-around;
                padding: 0; border-right: none; border-top: 1px solid rgba(255,255,255,0.1);
            }

            .task-icon.active { border-left: none; border-top: 3px solid var(--win-accent); }

            .window-overlay { left: 0; bottom: 65px; }
            .window-content { max-width: 100%; }

            .signature { bottom: 80px; right: 50%; transform: translateX(50%); width: 100%; text-align: center; }
            .desktop-greeting { top: 45%; }
        }

        .timer-big { font-size: clamp(48px, 15vw, 72px); text-align: center; font-weight: 100; color: var(--win-accent); margin: 30px 0 10px; }
        .admin-btn { margin-top: auto; opacity: 0.3; }
        @media (max-width: 768px) { .admin-btn { margin-top: 0; } }
        .close-btn { cursor: pointer; font-size: 24px; padding: 5px; }
    </style>
</head>
<body id="main-body">

    <div class="taskbar">
        <div class="task-icon" id="icon-timer" onclick="openApp('timer')">🔔</div>
        <div class="task-icon" id="icon-tomorrow" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="icon-full" onclick="openApp('full')">📚</div>
        <div class="task-icon admin-btn" onclick="login()">🔑</div>
    </div>

    <div class="desktop-greeting">
        <h1>Пилиповицька Гімназія</h1> 
        <p>Personal lesson list</p>
        <p style="font-size: 14px; margin-top: 20px; opacity: 0.6;">Керуй часом ефективно</p>
    </div>

    <div class="signature">Byme</div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title">Додаток</h2>
                <span class="close-btn" onclick="closeApp()">✕</span>
            </div>
            <div class="window-body" id="win-body"></div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "br.m.airways@gmail.com";
        let isAdmin = localStorage.getItem('school_admin') === 'true';

        const schedule = {
            1: { name: "Понеділок", lessons: ["Українська мова", "Математика", "Математика", "Укр. літ.", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", lessons: ["Фізкультура", "Англійська", "Історія", "Англійська", "Зарубіжна", "Інформатика"] },
            3: { name: "Середа", lessons: ["Українська мова", "Укр. літ.", "Технології", "Технології", "Математика", "Музика"] },
            4: { name: "Четвер", lessons: ["Англійська", "Українська", "Українська", "Зарубіжна", "Фізкультура", "Англійська"] },
            5: { name: "П'ятниця", lessons: ["Основи здоров'я", "Математика", "Природа", "Історія", "Математика"] }
        };

        const bells = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:25", e: "11:10"}, {s: "11:30", e: "12:15"},
            {s: "12:25", e: "13:10"}, {s: "13:20", e: "14:05"},
            {s: "14:15", e: "15:00"}
        ];

        function login() {
            const mail = prompt("Введіть email:");
            if(mail === ADMIN_EMAIL) {
                isAdmin = true;
                localStorage.setItem('school_admin', 'true');
                alert("Успішно!"); location.reload();
            }
        }

        function openApp(app) {
            const overlay = document.getElementById('overlay');
            const win = document.getElementById('win');
            const body = document.getElementById('win-body');
            const title = document.getElementById('win-title');
            
            document.querySelectorAll('.task-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('icon-'+app).classList.add('active');

            overlay.style.display = 'flex';
            setTimeout(() => win.classList.add('active'), 10);
            document.getElementById('main-body').classList.add('window-open');

            if(app === 'timer') { title.innerText = "Таймер"; startTimer(); }
            else if(app === 'tomorrow') { 
                title.innerText = "На завтра"; 
                const d = new Date().getDay();
                body.innerHTML = renderDay((d >= 5 || d === 0) ? 1 : d + 1);
            }
            else { 
                title.innerText = "Тиждень"; 
                let h = ""; for(let i=1; i<=5; i++) h += renderDay(i);
                body.innerHTML = h;
            }
        }

        function closeApp() {
            clearInterval(timerTick);
            document.getElementById('win').classList.remove('active');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-body').classList.remove('window-open');
                document.querySelectorAll('.task-icon').forEach(i => i.classList.remove('active'));
            }, 400);
        }

        function renderDay(id) {
            const data = schedule[id];
            let html = `<h3 style="color:var(--win-accent); margin-bottom:10px;">${data.name}</h3>`;
            data.lessons.forEach((l, i) => {
                const hw = localStorage.getItem('hw_'+l) || "Немає ДЗ";
                html += `<div class="lesson-card">
                    <strong>${i+1}. ${l}</strong>
                    <div class="hw-area">
                        ${isAdmin ? `<input class="hw-input" value="${hw==='Немає ДЗ'?'':hw}" onchange="localStorage.setItem('hw_${l}', this.value)">` : `📝 ${hw}`}
                    </div>
                </div>`;
            });
            return html;
        }

        let timerTick;
        function startTimer() {
            const body = document.getElementById('win-body');
            body.innerHTML = `<div class="timer-big" id="t-val">00:00</div><p id="t-status" style="text-align:center"></p>`;
            timerTick = setInterval(() => {
                const now = new Date();
                const cur = now.getHours()*60 + now.getMinutes();
                const sec = 60 - now.getSeconds();
                let found = false;
                bells.forEach((b, i) => {
                    const s = b.s.split(':').map(Number); const em = b.e.split(':').map(Number)[0]*60 + b.e.split(':').map(Number)[1];
                    const sm = s[0]*60 + s[1];
                    if(cur >= sm && cur < em) {
                        document.getElementById('t-val').innerText = `${em - cur - 1}:${sec < 10 ? '0'+sec : sec}`;
                        document.getElementById('t-status').innerText = `Урок ${i+1}`;
                        found = true;
                    }
                });
                if(!found) document.getElementById('t-status').innerText = "Перерва або кінець";
            }, 1000);
        }
    </script>
</body>
</html>
    </script>
</body>
</html>
