<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пилиповицька Гімназія | Smart Portal</title>
    
    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #6c5ce7;
            --taskbar-bg: rgba(15, 15, 15, 0.95);
            --text-light: #ffffff;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --color-passed: #b2bec3; 
            --color-future: #55efc4; 
            --ai-bubble: #ffffff;
            --user-bubble: #6c5ce7;
            --window-bg: #f0f2f5;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: var(--main-font); 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('https://kokl.ua/wp-content/uploads/2025/10/ostriv-epshtejna-scaled.jpg') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
            color: #2d3436;
        }

        /* Панель задач */
        .taskbar {
            width: 75px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 20px;
            z-index: 1000;
            border-right: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .task-icon {
            width: 52px;
            height: 52px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
        }

        .task-icon:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1) translateY(-2px);
        }

        .task-icon.active {
            background: var(--win-accent);
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.5);
        }

        /* Робочий стіл */
        .desktop-greeting {
            position: absolute;
            top: 45%;
            left: 55%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 5;
            width: 80%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        body.window-open .desktop-greeting {
            opacity: 0;
            transform: translate(-50%, -70%) scale(0.9);
            filter: blur(10px);
        }

        .desktop-greeting h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .signature {
            position: absolute;
            bottom: 25px;
            right: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Система Вікон */
        .window-overlay {
            position: fixed;
            top: 0;
            left: 75px;
            bottom: 0;
            right: 0;
            background: rgba(0,0,0,0.2);
            display: none;
            z-index: 500;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .window-content {
            width: 100%;
            max-width: 500px;
            background: var(--window-bg);
            height: 100%;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 50px rgba(0,0,0,0.3);
        }

        .window-content.active { transform: translateX(0); }

        .window-header {
            padding: 20px 25px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e1e4e8;
        }

        .close-btn { font-size: 28px; color: #b2bec3; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: #eb4d4b; }

        .window-body { flex: 1; overflow-y: auto; padding: 20px; }

        /* Картки уроків */
        .lesson-card {
            background: #ffffff;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 6px solid #dfe6e9;
            transition: 0.3s;
        }

        .lesson-future { border-left-color: var(--color-future); }
        .lesson-passed { border-left-color: var(--color-passed); opacity: 0.6; }
        .lesson-current { 
            border-left-color: var(--win-accent); 
            transform: scale(1.02); 
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.1);
        }

        .lesson-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lesson-name { font-weight: 700; color: #2d3436; }
        .lesson-time { font-size: 12px; color: #636e72; }
        
        .homework-box {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #485460;
            border: 1px dashed #dcdde1;
        }

        /* Таймер */
        .timer-display {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .timer-big {
            font-size: 48px;
            font-weight: 900;
            color: var(--win-accent);
            line-height: 1.2;
        }

        /* AI Чат */
        .chat-wrap { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .bubble.ai { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }
        .bubble.user { align-self: flex-end; background: var(--win-accent); color: white; border-bottom-right-radius: 4px; }

        .chat-controls {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
        }

        .send-btn {
            background: var(--win-accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .taskbar { width: 100%; height: 70px; flex-direction: row; justify-content: space-around; padding: 0; }
            .window-overlay { left: 0; bottom: 70px; }
            .desktop-greeting h1 { font-size: 2.2rem; }
        }
        
        #ai-status { display: none; padding: 5px 15px; font-size: 12px; color: var(--win-accent); font-weight: 600; }
    </style>
</head>
<body id="app-shell">

    <nav class="taskbar">
        <div class="task-icon" id="btn-timer" onclick="openApp('timer')">🔔</div>
        <div class="task-icon" id="btn-tomorrow" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="btn-full" onclick="openApp('full')">📖</div>
        <div class="task-icon" id="btn-ai" onclick="openApp('ai')">🤖</div>
        <div class="task-icon" style="margin-top:auto; opacity:0.1;" onclick="adminGate()">🔑</div>
    </nav>

    <div class="desktop-greeting">
        <h1 id="school-name">Пилиповицька Гімназія</h1>
        <p id="live-clock"></p>
    </div>

    <div class="signature">Student Project v2.0</div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win-container" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title">Завантаження...</h2>
                <div class="close-btn" onclick="closeApp()">&times;</div>
            </div>
            <div class="window-body" id="win-render-area"></div>
        </div>
    </div>

    <script>
        // --- ПЕРЕВІРКА КЛЮЧА (БЕЗ СОПЛІВ) ---
        const urlParams = new URLSearchParams(window.location.search);
        const keyFromUrl = urlParams.get('key');
        if (keyFromUrl) {
            localStorage.setItem('my_ai_key', keyFromUrl);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const getApiKey = () => localStorage.getItem('my_ai_key') || "";
        const getApiUrl = () => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${getApiKey()}`;

        // --- ДАНІ ---
        const ADMIN_PASS = "br.m.airways@gmail.com";
        let isEditMode = localStorage.getItem('gym_admin') === 'true';

        const schedule = {
            1: { name: "Понеділок", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", lessons: ["Основи здоров'я", "Математика", "Природа", "Історія", "Математика"] }
        };

        const bellTimes = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:30", e: "11:15"}, {s: "11:25", e: "12:10"},
            {s: "12:20", e: "13:05"}, {s: "13:10", e: "13:55"},
            {s: "14:00", e: "14:45"}, {s: "14:50", e: "15:35"}
        ];

        // --- ЛОГІКА ІНТЕРФЕЙСУ ---
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('uk-UA');
        }, 1000);

        function openApp(id) {
            const area = document.getElementById('win-render-area');
            const title = document.getElementById('win-title');
            
            document.querySelectorAll('.task-icon').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-'+id).classList.add('active');
            if(window.appInterval) clearInterval(window.appInterval);

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('app-shell').classList.add('window-open');
            setTimeout(() => document.getElementById('win-container').classList.add('active'), 10);

            switch(id) {
                case 'timer':
                    title.innerText = "Статус занять";
                    startTimerModule(area);
                    break;
                case 'tomorrow':
                    title.innerText = "На завтра";
                    let d = new Date().getDay();
                    let next = (d >= 5 || d === 0) ? 1 : d + 1;
                    area.innerHTML = renderDayUI(next, false);
                    break;
                case 'full':
                    title.innerText = "Повний тиждень";
                    area.innerHTML = [1,2,3,4,5].map(i => renderDayUI(i, false)).join('');
                    break;
                case 'ai':
                    title.innerText = "AI Асистент";
                    launchChat(area);
                    break;
            }
        }

        function closeApp() {
            document.getElementById('win-container').classList.remove('active');
            document.getElementById('app-shell').classList.remove('window-open');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                if(window.appInterval) clearInterval(window.appInterval);
            }, 400);
        }

        function renderDayUI(dayIdx, isLive) {
            const data = schedule[dayIdx];
            if(!data) return `<div class="lesson-card">Вихідний!</div>`;
            const now = new Date();
            const nowTotal = now.getHours() * 60 + now.getMinutes();

            let html = `<h3 style="margin: 20px 0 10px; color: var(--win-accent);">${data.name}</h3>`;
            data.lessons.forEach((name, i) => {
                let statusClass = "lesson-future";
                if(isLive && bellTimes[i]) {
                    const [sh, sm] = bellTimes[i].s.split(':').map(Number);
                    const [eh, em] = bellTimes[i].e.split(':').map(Number);
                    if(nowTotal >= (eh*60+em)) statusClass = "lesson-passed";
                    else if(nowTotal >= (sh*60+sm)) statusClass = "lesson-current";
                }
                const savedHW = localStorage.getItem('hw_' + name) || "Не вказано";
                html += `
                <div class="lesson-card ${statusClass}">
                    <div class="lesson-info">
                        <span class="lesson-name">${i+1}. ${name}</span>
                        <span class="lesson-time">${bellTimes[i]?.s || ''}</span>
                    </div>
                    <div class="homework-box">
                        ${isEditMode ? `<input type="text" value="${savedHW==='Не вказано'?'':savedHW}" onchange="localStorage.setItem('hw_${name}', this.value)" style="width:100%; border:none; background:transparent;">` : '📝 ' + savedHW}
                    </div>
                </div>`;
            });
            return html;
        }

        function startTimerModule(container) {
            const update = () => {
                const now = new Date();
                const curMin = now.getHours() * 60 + now.getMinutes();
                const curSec = now.getSeconds();
                let found = false;
                let html = "";

                for(let i=0; i < bellTimes.length; i++) {
                    const s = bellTimes[i].s.split(':').map(Number).reduce((a,b)=>a*60+b);
                    const e = bellTimes[i].e.split(':').map(Number).reduce((a,b)=>a*60+b);

                    if(curMin >= s && curMin < e) {
                        html = `<div class="timer-display"><div class="timer-big">${e-curMin-1}:${(59-curSec).toString().padStart(2,'0')}</div><p>Триває ${i+1} урок</p></div>`;
                        found = true; break;
                    }
                }
                if(!found) html = `<div class="timer-display"><div class="timer-big">--:--</div><p>Перерва або уроки закінчились</p></div>`;
                container.innerHTML = html + renderDayUI(now.getDay()||1, true);
            };
            update();
            window.appInterval = setInterval(update, 1000);
        }

        // --- AI LOGIC ---
        function launchChat(container) {
            container.innerHTML = `
                <div class="chat-wrap">
                    <div class="chat-messages" id="chat-flow"><div class="bubble ai">Вітаю! Я ШІ гімназії. Запитуй про розклад.</div></div>
                    <div id="ai-status">ШІ думає...</div>
                    <div class="chat-controls">
                        <input type="text" class="chat-input" id="ai-input" placeholder="Який зараз урок?">
                        <button class="send-btn" onclick="askAI()">➤</button>
                    </div>
                </div>`;
            document.getElementById('ai-input').focus();
            document.getElementById('ai-input').addEventListener('keypress', e => e.key==='Enter' && askAI());
        }

        async function askAI() {
            const inp = document.getElementById('ai-input');
            const text = inp.value.trim();
            if(!text || !getApiKey()) return alert("API ключ не знайдено! Додай ?key=... в URL");

            appendBubble(text, 'user');
            inp.value = '';
            const status = document.getElementById('ai-status');
            status.style.display = 'block';

            const context = `Ти асистент Пилиповицької гімназії. Розклад: ${JSON.stringify(schedule)}. Дзвінки: 1(08:30-09:15), 2(09:25-10:10), 3(10:30-11:15), 4(11:25-12:10), 5(12:20-13:05), 6(13:10-13:55). Сьогодні ${new Date().toLocaleDateString('uk-UA',{weekday:'long'})}. Відповідай українською, коротко. Запит: ${text}`;

            try {
                const res = await fetch(getApiUrl(), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
                });
                const data = await res.json();
                status.style.display = 'none';
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Помилка API";
                appendBubble(reply, 'ai');
            } catch(e) {
                status.style.display = 'none';
                appendBubble("Помилка з'єднання.", 'ai');
            }
        }

        function appendBubble(msg, role) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerHTML = msg.replace(/\n/g, '<br>');
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function adminGate() {
            const p = prompt("Введіть ключ доступу:");
            if(p === ADMIN_PASS) {
                isEditMode = true;
                localStorage.setItem('gym_admin', 'true');
                location.reload();
            }
        }
    </script>
</body>
</html>
