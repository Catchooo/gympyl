<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Розклад Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent: #6c5ce7;
            --text-dark: #2d3436;
            --secondary: #a29bfe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        .app-container { width: 100%; max-width: 400px; padding: 20px; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-weight: 300; }

        .menu-btn {
            background: var(--card-bg);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-btn:active { transform: scale(0.95); }
        .btn-bell { background: #ffeaa7; color: #d35400; }

        #schedule-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }

        .schedule-sheet {
            background: white;
            width: 100%;
            max-height: 90vh;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: 0.4s ease-out;
        }

        .schedule-sheet.active { transform: translateY(0); }

        .close-btn {
            background: #eee; border: none; width: 35px; height: 35px;
            border-radius: 50%; float: right; cursor: pointer;
        }

        .day-block { margin-bottom: 25px; }
        .day-title {
            font-size: 20px; color: var(--accent);
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 12px; padding-bottom: 5px;
        }

        .lesson {
            padding: 12px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .lesson-info { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .lesson-num { color: #b2bec3; font-size: 14px; }

        /* Стилі для ДЗ */
        .hw-container {
            margin-top: 5px;
            padding-left: 25px;
        }

        .hw-text {
            font-size: 13px;
            color: #636e72;
            font-style: italic;
            display: block;
        }

        .hw-input {
            width: 100%;
            border: 1px dashed var(--secondary);
            border-radius: 5px;
            padding: 5px;
            font-size: 13px;
            margin-top: 5px;
            display: none; /* Сховано за замовчуванням */
        }

        .admin-mode .hw-input { display: block; }
        .admin-mode .hw-text { display: none; }

        .admin-toggle {
            font-size: 12px;
            color: white;
            text-decoration: underline;
            cursor: pointer;
            text-align: center;
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Мій Навчальний День</h1>
        
        <button class="menu-btn btn-bell" onclick="checkBell()">
            🔔 Скільки до дзвінка?
        </button>

        <button class="menu-btn" onclick="showTomorrow()">
            📅 Розклад на завтра
        </button>
        
        <button class="menu-btn" onclick="showFull()">
            📚 Повний розклад
        </button>

        <div class="admin-toggle" onclick="toggleAdmin()">Режим редагування (для старости)</div>
    </div>

    <div id="schedule-overlay" onclick="closeSchedule()">
        <div class="schedule-sheet" id="sheet" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeSchedule()">✕</button>
            <div id="schedule-content"></div>
        </div>
    </div>

    <script>
        // Розклад дзвінків (5-9 класи)
        const bellSchedule = [
            { start: "08:30", end: "09:15" }, // 1 урок
            { start: "09:25", end: "10:10" }, // 2 урок
            { start: "10:25", end: "11:10" }, // 3 урок
            { start: "11:30", end: "12:15" }, // 4 урок
            { start: "12:25", end: "13:10" }, // 5 урок
            { start: "13:20", end: "14:05" }, // 6 урок
            { start: "14:15", end: "15:00" }  // 7 урок
        ];

        const scheduleData = {
            1: { name: "Понеділок", icon: "✅", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", icon: "✅", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", icon: "✅", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", icon: "✅", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", icon: "✅", lessons: ["Основи здоров'я", "Основи здоров’я", "Математика", "Природа", "Історія", "Математика"] }
        };

        let isAdmin = false;

        function toggleAdmin() {
            const pass = prompt("Введіть пароль для редагування:");
            if (pass === "1234") { // Твій секретний пароль
                isAdmin = !isAdmin;
                alert(isAdmin ? "Режим редактора увімкнено!" : "Режим редактора вимкнено.");
            } else {
                alert("Невірний пароль!");
            }
        }

        function checkBell() {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            
            let message = "Уроки ще не почалися або вже закінчилися 😴";

            for (let i = 0; i < bellSchedule.length; i++) {
                const start = bellSchedule[i].start.split(':').map(Number);
                const end = bellSchedule[i].end.split(':').map(Number);
                const startMin = start[0] * 60 + start[1];
                const endMin = end[0] * 60 + end[1];

                if (currentTime >= startMin && currentTime < endMin) {
                    message = `Зараз ${i+1}-й урок. \nДо кінця: ${endMin - currentTime} хв. ⏳`;
                    break;
                } else if (i < bellSchedule.length - 1) {
                    const nextStart = bellSchedule[i+1].start.split(':').map(Number);
                    const nextStartMin = nextStart[0] * 60 + nextStart[1];
                    if (currentTime >= endMin && currentTime < nextStartMin) {
                        message = `Зараз перерва! 🍎 \nДо ${i+2}-го уроку: ${nextStartMin - currentTime} хв.`;
                        break;
                    }
                }
            }
            alert(message);
        }

        function getHW(subject) {
            return localStorage.getItem('hw_' + subject) || "ДЗ не записано";
        }

        function saveHW(subject, value) {
            localStorage.setItem('hw_' + subject, value);
        }

        function renderDay(dayId) {
            const day = scheduleData[dayId];
            if (!day) return '';
            
            let html = `<div class="day-block ${isAdmin ? 'admin-mode' : ''}">
                <div class="day-title">${day.icon} ${day.name}</div>`;
            
            day.lessons.forEach((lesson, index) => {
                const currentHW = getHW(lesson);
                html += `
                    <div class="lesson">
                        <div class="lesson-info">
                            <span class="lesson-num">${index + 1}.</span>
                            <span class="lesson-name">${lesson}</span>
                        </div>
                        <div class="hw-container">
                            <span class="hw-text">📝 ${currentHW}</span>
                            <input type="text" class="hw-input" 
                                   placeholder="Впишіть ДЗ..." 
                                   value="${currentHW === 'ДЗ не записано' ? '' : currentHW}"
                                   onchange="saveHW('${lesson}', this.value)">
                        </div>
                    </div>`;
            });
            
            html += `</div>`;
            return html;
        }

        function openSheet(content) {
            document.getElementById('schedule-content').innerHTML = content;
            const overlay = document.getElementById('schedule-overlay');
            const sheet = document.getElementById('sheet');
            overlay.style.display = 'flex';
            setTimeout(() => sheet.classList.add('active'), 10);
        }

        function closeSchedule() {
            const sheet = document.getElementById('sheet');
            sheet.classList.remove('active');
            setTimeout(() => { document.getElementById('schedule-overlay').style.display = 'none'; }, 400);
        }

        function showFull() {
            let fullHtml = '<h2>Повний розклад</h2><br>';
            for(let i = 1; i <= 5; i++) fullHtml += renderDay(i);
            openSheet(fullHtml);
        }

        function showTomorrow() {
            const now = new Date();
            let today = now.getDay();
            let tomorrow = (today >= 5 || today === 0) ? 1 : today + 1;
            let title = tomorrow === 1 ? "<h2>На понеділок</h2><br>" : "<h2>На завтра</h2><br>";
            openSheet(title + renderDay(tomorrow));
        }
    </script>
</body>
</html>
