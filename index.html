<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пилиповицька Гімназія</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    
    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #6c5ce7;
            --win-accent-active: #2980b9;
            --taskbar-bg: rgba(15, 15, 15, 0.95);
            --text-light: #ffffff;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --status-passed: #b2bec3;
            --status-future: #2ecc71;
            --status-current: #3498db;
            --window-bg: #f0f2f5;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: var(--main-font); 
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: thin;
            scrollbar-color: var(--win-accent) transparent;
        }

        body {
            background: url('https://kokl.ua/wp-content/uploads/2025/10/ostriv-epshtejna-scaled.jpg') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
            color: #2d3436;
        }

        .taskbar {
            width: 75px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 20px;
            z-index: 1000;
            border-right: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .task-icon {
            width: 54px;
            height: 54px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 26px;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .task-icon:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1) translateY(-3px);
        }

        .task-icon.active {
            background: var(--win-accent);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .task-icon.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
        }

        .desktop-greeting {
            position: absolute;
            top: 45%;
            left: 55%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 5;
            width: 85%;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        body.window-open .desktop-greeting {
            opacity: 0;
            transform: translate(-50%, -75%) scale(0.85);
            filter: blur(15px);
        }

        .desktop-greeting h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        #live-clock {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 300;
            opacity: 0.9;
            font-variant-numeric: tabular-nums;
        }

        .window-overlay {
            position: fixed;
            top: 0;
            left: 75px;
            bottom: 0;
            right: 0;
            background: rgba(0,0,0,0.25);
            display: none;
            z-index: 500;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .window-content {
            width: 100%;
            max-width: 550px;
            background: var(--window-bg);
            height: 100%;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 25px 0 60px rgba(0,0,0,0.4);
        }

        .window-content.active { transform: translateX(0); }

        .window-header {
            padding: 25px 30px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e1e4e8;
        }

        .window-header h2 { font-size: 22px; font-weight: 700; color: #1e272e; }

        .close-btn { 
            font-size: 32px; 
            color: #b2bec3; 
            cursor: pointer; 
            transition: all 0.2s ease;
            line-height: 1;
        }
        .close-btn:hover { color: #ff4757; transform: rotate(90deg); }

        .window-body { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            background: #fdfdfd;
        }

        .lesson-card {
            background: #ffffff;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 16px;
            border-left: 8px solid #dfe6e9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--card-shadow);
        }

        .lesson-card.status-passed { border-left-color: var(--status-passed); opacity: 0.65; background: #f1f2f6; }
        .lesson-card.status-current { 
            border-left-color: var(--status-current); 
            background: #f1f9ff; 
            transform: scale(1.02); 
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.15); 
        }
        .lesson-card.status-future { border-left-color: var(--status-future); background: #f2fff7; }

        .lesson-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .lesson-name { font-weight: 800; color: #2d3436; font-size: 17px; }
        .lesson-time { font-size: 13px; color: #7f8c8d; background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 20px; }

        .homework-box {
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            color: #576574;
            border: 1px solid #eee;
            line-height: 1.5;
            position: relative;
        }

        .homework-input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #2d3436;
        }

        .timer-display {
            background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .timer-big { font-size: 56px; font-weight: 900; letter-spacing: -2px; line-height: 1; margin: 10px 0; }
        .timer-status { font-size: 12px; color: #a4b0be; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        /* Стилі для форми логіну та оцінок */
        .grade-input { width: 60px; padding: 5px; border-radius: 5px; border: 1px solid #ccc; text-align: center; margin-top: 5px; }
        .auth-btn {
            background: var(--win-accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .auth-btn:hover { background: var(--win-accent-active); }

        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .taskbar { 
                width: 100%; height: 75px; 
                flex-direction: row; justify-content: space-around; 
                padding: 0 15px; border-right: none; border-top: 1px solid rgba(255,255,255,0.1); 
            }
            .window-overlay { left: 0; bottom: 75px; }
            .window-content { max-width: 100%; border-radius: 30px 30px 0 0; }
        }
    </style>
</head>
<body id="app-shell">

    <nav class="taskbar">
        <div class="task-icon" id="btn-timer" onclick="openApp('timer')">🔔</div>
        <div class="task-icon" id="btn-tomorrow" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="btn-full" onclick="openApp('full')">📖</div>
        <div class="task-icon" id="btn-classes" onclick="openApp('classes')">🏫</div>
        <div class="task-icon" style="margin-top:auto; opacity:0.1;" onclick="adminGate()">🔑</div>
    </nav>

    <div class="desktop-greeting">
        <h1 id="school-name">Пилиповицька Гімназія</h1>
        <p id="live-clock">Завантаження...</p>
    </div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win-container" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title">Вікно</h2>
                <div class="close-btn" onclick="closeApp()">&times;</div>
            </div>
            <div class="window-body" id="win-render-area"></div>
        </div>
    </div>

    <script src="ai.js"></script>

    <script>
        try {
            // Передбачається, що getAuth, getFirestore та app підключені вище або в ai.js
            const auth = getAuth(app);
            const db = getFirestore(app);

            // Робимо змінні доступними для звичайного скріпта нижче
            window.auth = auth;
            window.db = db;
            window.fb = { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, doc, setDoc, getDoc };
        } catch (e) {
            console.warn("Firebase ще не підключено або виникла помилка ініціалізації.");
        }
    </script>

    <script>
        const ADMIN_PASS = "br.m.airways@gmail.com";
        let isEditMode = localStorage.getItem('gym_admin') === 'true';
        const bellSound = new Audio('GO.mp3'); 
        let lastState = null;

        const schedule = {
            1: { name: "Понеділок", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", lessons: ["Основи здоров'я", "Основи здоров'я", "Математика", "Природа", "Історія", "Математика"] }
        };

        const bellTimes = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:30", e: "11:15"}, {s: "11:25", e: "12:10"},
            {s: "12:20", e: "13:05"}, {s: "13:10", e: "13:55"},
            {s: "14:00", e: "14:45"}, {s: "14:50", e: "15:35"}
        ];

        setInterval(() => {
            const now = new Date();
            const clock = document.getElementById('live-clock');
            if(clock) clock.innerText = now.toLocaleTimeString('uk-UA');
        }, 1000);

        function openApp(id) {
            const area = document.getElementById('win-render-area');
            const title = document.getElementById('win-title');
            
            document.querySelectorAll('.task-icon').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-'+id)?.classList.add('active');
            
            if(window.appInterval) clearInterval(window.appInterval);
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('app-shell').classList.add('window-open');
            
            setTimeout(() => document.getElementById('win-container').classList.add('active'), 20);
            
            if (id === 'classes') {
                title.innerText = "Обери свій клас";
                area.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="auth-btn" onclick="setMyClass('5')">5 Клас</button>
                    <button class="auth-btn" onclick="setMyClass('6')">6 Клас</button>
                    <button class="auth-btn" onclick="setMyClass('7')">7 Клас</button>
                    <button class="auth-btn" onclick="setMyClass('8')">8 Клас</button>
                    <button class="auth-btn" onclick="setMyClass('9')">9 Клас</button>
                </div>
                `;
            }

            // Функція для збереження класу
            window.setMyClass = function(c) {
                localStorage.setItem('user_class', c);
                location.reload();
            };

            switch(id) {
                case 'timer':
                    title.innerText = "Поточний статус";
                    startTimerModule(area);
                    break;
                case 'tomorrow':
                    title.innerText = "Завдання на завтра";
                    let d = new Date().getDay();
                    let targetDay = (d >= 5 || d === 0) ? 1 : d + 1;
                    area.innerHTML = renderDayUI(targetDay, false);
                    break;
                case 'full':
                    title.innerText = "Розклад на тиждень";
                    area.innerHTML = [1,2,3,4,5].map(i => renderDayUI(i, false)).join('');
                    break;
                case 'grades':
                    title.innerText = "Нові знання";
                    if (typeof renderGrades === 'function') renderGrades(area);
                    break;
                case 'ai':
                    title.innerText = "AI Асистент";
                    if(typeof launchChat === 'function') launchChat(area);
                    break;
            }
        }

        function closeApp() {
            document.getElementById('win-container').classList.remove('active');
            document.getElementById('app-shell').classList.remove('window-open');
            document.querySelectorAll('.task-icon').forEach(el => el.classList.remove('active'));
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 400);
        }

        function renderDayUI(dayIdx, isLive) {
            const data = schedule[dayIdx];
            if(!data) return '';
            const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
            
            let html = `<div style="margin: 30px 0 15px; display:flex; align-items:center; gap:10px;">
                            <span style="font-size:24px; font-weight:900; color:var(--win-accent)">${data.name}</span>
                            <div style="flex:1; height:2px; background:#eee;"></div>
                        </div>`;
            
            data.lessons.forEach((name, i) => {
                let status = "status-future";
                if(isLive && bellTimes[i]) {
                    const [sh, sm] = bellTimes[i].s.split(':').map(Number);
                    const [eh, em] = bellTimes[i].e.split(':').map(Number);
                    const startTotal = sh*60 + sm;
                    const endTotal = eh*60 + em;
                    if(nowMin >= endTotal) status = "status-passed";
                    else if(nowMin >= startTotal) status = "status-current";
                }
                
                const hw = localStorage.getItem('hw_' + name) || "Не записано";
                html += `
                <div class="lesson-card ${status}">
                    <div class="lesson-info">
                        <span class="lesson-name">${i+1}. ${name}</span>
                        <span class="lesson-time">${bellTimes[i]?.s || '--'} - ${bellTimes[i]?.e || '--'}</span>
                    </div>
                    <div class="homework-box">
                        ${isEditMode ? `<input type="text" class="homework-input" value="${hw === 'Не записано' ? '' : hw}" 
                            placeholder="ДЗ: Введіть завдання..."
                            onchange="localStorage.setItem('hw_${name}', this.value || 'Не записано')">` : 'ДЗ: ' + hw}
                    </div>
                </div>`;
            });
            return html;
        }

        function startTimerModule(container) {
            const update = () => {
                const now = new Date();
                const day = now.getDay();
                const curSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                let found = false;
                let timerHtml = "";

                const activeDay = (day === 0 || day === 6) ? 1 : day;

                for(let i=0; i < bellTimes.length; i++) {
                    const [sh, sm] = bellTimes[i].s.split(':').map(Number);
                    const [eh, em] = bellTimes[i].e.split(':').map(Number);
                    const s = sh*3600 + sm*60, e = eh*3600 + em*60;

                    if(curSec >= s && curSec < e) {
                        if (lastState !== "L" + i) { 
                            bellSound.play().catch(() => {}); 
                            lastState = "L" + i; 
                        }
                        timerHtml = renderTimerUI("До кінця уроку", e - curSec, "#3498db");
                        found = true; break;
                    } else if (i < bellTimes.length - 1) {
                        const [nsh, nsm] = bellTimes[i+1].s.split(':').map(Number);
                        const ns = nsh*3600 + nsm*60;
                        if(curSec >= e && curSec < ns) {
                            timerHtml = renderTimerUI("До початку уроку", ns - curSec, "#2ecc71");
                            if (lastState !== "B" + i) lastState = "B" + i;
                            found = true; break;
                        }
                    }
                }
                if(!found) {
                    timerHtml = renderTimerUI("Уроки закінчились", null, "#7f8c8d");
                    lastState = "off"; 
                }
                container.innerHTML = timerHtml + renderDayUI(activeDay, true);
            };
            update(); window.appInterval = setInterval(update, 1000);
        }

        function renderTimerUI(status, sec, col) {
            let time = "--:--";
            if(sec !== null) {
                const m = Math.floor(sec/60), s = sec%60;
                time = `${m}:${s.toString().padStart(2,'0')}`;
            }
            return `<div class="timer-display">
                        <div class="timer-status">${status}</div>
                        <div class="timer-big" style="color:${col}">${time}</div>
                    </div>`;
        }

        function adminGate() {
            const p = prompt("Пароль адміністратора:");
            if(p === ADMIN_PASS) { 
                localStorage.setItem('gym_admin', 'true'); 
                location.reload(); 
            } else if (p === "off") {
                localStorage.removeItem('gym_admin');
                location.reload();
            }
        }
        window.schedule = schedule;
    </script>
</body>
</html>
