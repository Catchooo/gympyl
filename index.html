<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пилиповицька Гімназія</title>

    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #6c5ce7;
            --win-accent-active: #2980b9;
            --taskbar-bg: rgba(15, 15, 15, 0.95);
            --text-light: #ffffff;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --status-passed: #b2bec3; /* Сірий */
            --status-future: #2ecc71; /* Зелений */
            --status-current: #3498db; /* Синій */
            --window-bg: #f0f2f5;
            --card-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: var(--main-font); 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('https://kokl.ua/wp-content/uploads/2025/10/ostriv-epshtejna-scaled.jpg') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
            color: #2d3436;
        }

        .taskbar {
            width: 75px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 20px;
            z-index: 1000;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .task-icon {
            width: 54px;
            height: 54px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 26px;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .task-icon:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1) translateY(-3px);
        }

        .task-icon.active {
            background: var(--win-accent);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .desktop-greeting {
            position: absolute;
            top: 45%;
            left: 55%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 5;
            width: 85%;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        body.window-open .desktop-greeting {
            opacity: 0;
            transform: translate(-50%, -75%) scale(0.85);
            filter: blur(15px);
        }

        .desktop-greeting h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 15px;
            font-weight: 800;
        }

        .window-overlay {
            position: fixed;
            top: 0;
            left: 75px;
            bottom: 0;
            right: 0;
            background: rgba(0,0,0,0.25);
            display: none;
            z-index: 500;
            backdrop-filter: blur(12px);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .window-content {
            width: 100%;
            max-width: 550px;
            background: var(--window-bg);
            height: 100%;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .window-content.active { transform: translateX(0); }

        .window-header {
            padding: 25px 30px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e1e4e8;
        }

        .close-btn { font-size: 32px; color: #b2bec3; cursor: pointer; line-height: 1; }

        .window-body { flex: 1; overflow-y: auto; padding: 25px; }

        /* ВЕЛИКІ КАРТКИ З КОЛЬОРАМИ */
        .lesson-card {
            background: #ffffff;
            padding: 25px 20px;
            margin-bottom: 15px;
            border-radius: 20px;
            border-left: 10px solid;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: var(--card-shadow);
        }

        .lesson-card.status-passed { border-left-color: var(--status-passed); opacity: 0.7; }
        .lesson-card.status-future { border-left-color: var(--status-future); }
        .lesson-card.status-current { 
            border-left-color: var(--status-current); 
            background: #e3f2fd;
            transform: scale(1.02);
        }

        .lesson-name { font-weight: 800; color: #2d3436; font-size: 18px; }

        /* ЧАС В ОВАЛІ (ПРАВИЙ НИЖНІЙ КУТ) */
        .lesson-time-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.05);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #636e72;
        }

        /* ТАЙМЕР ВГОРІ */
        .timer-display {
            background: var(--win-accent);
            color: white;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
        }
        .timer-big { font-size: 52px; font-weight: 900; line-height: 1; }
        .timer-status { font-size: 13px; font-weight: 700; opacity: 0.9; margin-top: 5px; }

        .hw-input { width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 8px; margin-top: 10px; outline: none; }
        .btn-class { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--win-accent); color: white; margin-bottom: 10px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .taskbar { width: 100%; height: 70px; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid rgba(255,255,255,0.1); }
            .window-overlay { left: 0; bottom: 70px; }
        }
    </style>
</head>
<body>

    <nav class="taskbar">
        <div class="task-icon" id="btn-today" onclick="openApp('today')">🔔</div>
        <div class="task-icon" id="btn-tomorrow" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="btn-full" onclick="openApp('full')">📖</div>
        <div class="task-icon" id="btn-settings" onclick="openApp('settings')">🏫</div>
        <div class="task-icon" style="margin-top:auto; opacity:0.2;" onclick="adminGate()">🔑</div>
    </nav>

    <div class="desktop-greeting">
        <h1 id="live-clock">00:00</h1>
        <p>Пилиповицька Гімназія — 6 Клас</p>
    </div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win-container" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title">Вікно</h2>
                <div class="close-btn" onclick="closeApp()">&times;</div>
            </div>
            <div class="window-body" id="win-content"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "br.m.airways@gmail.com";
        let isEditMode = localStorage.getItem('gym_admin') === 'true';
        let currentClass = localStorage.getItem('user_class') || "6";
        const bellSound = new Audio('GO.mp3');
        let lastBellMin = null;

        const bellTimes = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:30", e: "11:15"}, {s: "11:25", e: "12:10"},
            {s: "12:20", e: "13:05"}, {s: "13:10", e: "13:55"},
            {s: "14:00", e: "14:45"}, {s: "14:50", e: "15:35"}
        ];

        const schedule = {
            "6": {
                1: ["Укр. мова", "Математика", "Математика", "Укр. літ.", "Мистецтво", "Географія"],
                2: ["Фізкультура", "Англ. мова", "Історія", "Англ. мова", "Заруб. літ.", "Інформатика"],
                3: ["Укр. мова", "Укр. літ.", "Технології", "Технології", "Математика", "Музика", "Географія"],
                4: ["Англ. мова", "Укр. мова", "Укр. мова", "Заруб. літ.", "Фізкультура", "Англ. мова", "Фізкультура"],
                5: ["Основи здоров'я", "Математика", "Природа", "Історія", "Математика"]
            }
        };

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('live-clock').innerText = timeStr;
            
            const curMin = now.getHours() * 60 + now.getMinutes();
            
            // ЗВУК ТІЛЬКИ НА ПОЧАТКУ УРОКУ
            bellTimes.forEach(t => {
                const [sh, sm] = t.s.split(':').map(Number);
                if (curMin === (sh*60 + sm) && lastBellMin !== curMin) {
                    bellSound.play().catch(e => console.log("Чекаю взаємодії для звуку"));
                    lastBellMin = curMin;
                }
            });

            if(document.getElementById('btn-today').classList.contains('active')) renderToday();
        }
        setInterval(updateClock, 1000);

        function openApp(id) {
            document.querySelectorAll('.task-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-'+id)?.classList.add('active');
            document.getElementById('overlay').style.display = 'block';
            document.body.classList.add('window-open');
            setTimeout(() => document.getElementById('win-container').classList.add('active'), 10);

            const area = document.getElementById('win-content');
            const title = document.getElementById('win-title');

            if(id === 'today') { title.innerText = "Сьогодні"; renderToday(); }
            if(id === 'tomorrow') { title.innerText = "Завтра"; renderTomorrow(); }
            if(id === 'full') { title.innerText = "Тиждень"; renderWeek(); }
            if(id === 'settings') { title.innerText = "Клас"; renderSettings(); }
        }

        function renderToday() {
            const area = document.getElementById('win-content');
            const now = new Date();
            const day = now.getDay();
            const curMin = now.getHours() * 60 + now.getMinutes();
            const curSec = now.getSeconds();
            const lessons = schedule[currentClass][day];

            if(!lessons || day === 0 || day === 6) {
                area.innerHTML = "<h3>Сьогодні вихідний! 🥳</h3>"; return;
            }

            let timerHtml = "";
            let allDone = true;

            const cards = lessons.map((name, i) => {
                const [sh, sm] = bellTimes[i].s.split(':').map(Number);
                const [eh, em] = bellTimes[i].e.split(':').map(Number);
                const start = sh*60+sm, end = eh*60+em;

                let status = "status-future";
                if(curMin >= end) status = "status-passed";
                else {
                    allDone = false;
                    if(curMin >= start) {
                        status = "status-current";
                        const m = end - curMin - 1, s = 60 - curSec;
                        timerHtml = `<div class="timer-display"><div class="timer-big">00:${m<10?'0'+m:m}:${s<10?'0'+s:s}</div><div class="timer-status">До кінця уроку</div></div>`;
                    } else if (i > 0 && curMin < start && curMin >= (bellTimes[i-1].e.split(':')[0]*60 + Number(bellTimes[i-1].e.split(':')[1]))) {
                        const m = start - curMin - 1, s = 60 - curSec;
                        timerHtml = `<div class="timer-display" style="background:#2ecc71"><div class="timer-big">00:${m<10?'0'+m:m}:${s<10?'0'+s:s}</div><div class="timer-status">До початку уроку</div></div>`;
                    }
                }

                return `<div class="lesson-card ${status}"><div class="lesson-name">${i+1}. ${name}</div><div class="lesson-time-badge">${bellTimes[i].s} - ${bellTimes[i].e}</div></div>`;
            }).join('');

            if(allDone) {
                timerHtml = `<div class="timer-display" style="background:#b2bec3"><div class="timer-big">00:00:00</div><div class="timer-status">На сьогодні все! ✅</div></div>`;
            }

            area.innerHTML = timerHtml + cards;
        }

        function renderTomorrow() {
            const area = document.getElementById('win-content');
            let next = new Date().getDay() + 1;
            if(next > 5) next = 1;
            const lessons = schedule[currentClass][next];
            const names = ["", "Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця"];

            area.innerHTML = `<h3>Розклад на ${names[next]}</h3><br>` + lessons.map((name, i) => `
                <div class="lesson-card status-future">
                    <div class="lesson-name">${i+1}. ${name}</div>
                    <div class="lesson-time-badge">${bellTimes[i].s} - ${bellTimes[i].e}</div>
                </div>
            `).join('');
        }

        function renderWeek() {
            const area = document.getElementById('win-content');
            const names = ["", "Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця"];
            area.innerHTML = [1,2,3,4,5].map(d => `
                <h4 style="margin: 20px 0 10px; color: var(--win-accent);">${names[d]}</h4>
                ${schedule[currentClass][d].map((l, i) => {
                    const hw = localStorage.getItem('hw_'+l) || "Завдань немає";
                    return `
                    <div class="lesson-card status-future" style="padding-bottom: 45px;">
                        <div class="lesson-name">${l}</div>
                        <div style="font-size:13px; color:#636e72; margin-top:5px;">
                            ${isEditMode ? `<input class="hw-input" value="${hw==='Завдань немає'?'':hw}" onchange="localStorage.setItem('hw_${l}', this.value)">` : 'ДЗ: '+hw}
                        </div>
                        <div class="lesson-time-badge">${bellTimes[i].s} - ${bellTimes[i].e}</div>
                    </div>`;
                }).join('')}
            `).join('');
        }

        function renderSettings() {
            const area = document.getElementById('win-content');
            area.innerHTML = ["5","6","7","8","9"].map(c => `
                <button class="btn-class" style="background:${c===currentClass?'#3498db':''}" 
                onclick="localStorage.setItem('user_class', '${c}'); location.reload()">${c} Клас</button>
            `).join('');
        }

        function adminGate() {
            const p = prompt("Пароль адміністратора:");
            if(p === ADMIN_PASS) { localStorage.setItem('gym_admin', 'true'); location.reload(); }
            else if(p === "off") { localStorage.removeItem('gym_admin'); location.reload(); }
        }

        function closeApp() {
            document.getElementById('win-container').classList.remove('active');
            document.body.classList.remove('window-open');
            setTimeout(() => document.getElementById('overlay').style.display='none', 400);
        }
    </script>
</body>
</html>
