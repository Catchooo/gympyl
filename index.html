<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пилиповицька Гімназія | Платформа</title>
    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #6c5ce7;
            --taskbar-bg: rgba(0, 0, 0, 0.9);
            --text-light: #ffffff;
            --main-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --color-passed: #95a5a6; 
            --color-future: #2ecc71; 
            --ai-bubble: #ffffff;
            --user-bubble: #6c5ce7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--main-font); }

        body {
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Taskbar */
        .taskbar {
            width: 70px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(15px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            z-index: 1000;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .task-icon {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 26px;
            color: white;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 12px;
        }

        .task-icon:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1);
        }

        .task-icon.active {
            background: var(--win-accent);
            box-shadow: 0 0 15px var(--win-accent);
        }

        /* Desktop Area */
        .desktop-greeting {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 10;
            width: 90%;
            transition: 0.5s;
            pointer-events: none;
        }
        body.window-open .desktop-greeting { opacity: 0; transform: translate(-50%, -60%); }

        .signature {
            position: absolute;
            bottom: 20px;
            right: 25px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Windows System */
        .window-overlay {
            position: fixed;
            top: 0;
            left: 70px;
            bottom: 0;
            right: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 500;
            backdrop-filter: blur(5px);
        }

        .window-content {
            width: 100%;
            max-width: 450px;
            background: #f4f4f9;
            height: 100%;
            transform: translateX(-100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }

        .window-content.active { transform: translateX(0); }

        .window-header {
            padding: 20px 25px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .window-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Widgets & Lessons */
        .lesson-card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            border-left: 6px solid #ddd;
            transition: 0.2s;
        }

        .lesson-future { border-left-color: var(--color-future); }
        .lesson-passed { border-left-color: var(--color-passed); opacity: 0.7; }
        .lesson-current { 
            border-left-color: var(--win-accent); 
            transform: scale(1.02); 
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2);
        }
        
        .timer-big {
            font-size: 42px;
            text-align: center;
            font-weight: 800;
            color: var(--win-accent);
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        /* AI Chat System */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding: 10px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.5;
            animation: msgFade 0.3s ease;
            position: relative;
            white-space: pre-wrap;
        }

        @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } }

        .msg.ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            color: #2d3436;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .msg.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 10px 18px;
            outline: none;
            background: #f8f9fa;
        }

        .send-btn {
            background: var(--win-accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .typing-indicator {
            padding: 8px 15px;
            font-size: 13px;
            color: #888;
            display: none;
        }

        /* Mobile adaptation */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .taskbar { width: 100%; height: 75px; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid rgba(255,255,255,0.1); }
            .window-overlay { left: 0; bottom: 75px; }
            .window-content { max-width: 100%; }
        }
    </style>
</head>
<body id="main-body">

    <div class="taskbar">
        <div class="task-icon" id="btn-timer" onclick="openApp('timer')">🔔</div>
        <div class="task-icon" id="btn-tomorrow" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="btn-full" onclick="openApp('full')">📖</div>
        <div class="task-icon" id="btn-ai" onclick="openApp('ai')">🤖</div>
        <div class="task-icon" style="margin-top:auto; opacity:0.2;" onclick="adminLogin()">🔑</div>
    </div>

    <div class="desktop-greeting">
        <h1 style="font-size: 3.5rem; letter-spacing: -1px;">Пилиповицька Гімназія</h1>
        <p style="font-size: 1.2rem; opacity: 0.9;">Education Management System</p>
    </div>

    <div class="signature">Byme © 2026</div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title" style="font-weight: 600; color: #2c3e50;">Додаток</h2>
                <span style="cursor:pointer; font-size:30px; color: #b2bec3;" onclick="closeApp()">×</span>
            </div>
            <div class="window-body" id="win-body"></div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "br.m.airways@gmail.com";
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        const schedule = {
            1: { name: "Понеділок", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", lessons: ["Основи здоров'я", "Математика", "Природа", "Історія", "Математика"] }
        };

        const bells = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:25", e: "11:10"}, {s: "11:30", e: "12:15"},
            {s: "12:25", e: "13:10"}, {s: "13:20", e: "14:05"},
            {s: "14:15", e: "15:00"}
        ];

        function adminLogin() {
            const m = prompt("Email адміністратора:");
            if(m === ADMIN_EMAIL) {
                isAdmin = true;
                localStorage.setItem('is_admin', 'true');
                alert("Доступ дозволено.");
                location.reload();
            }
        }

        function openApp(app) {
            const overlay = document.getElementById('overlay');
            const win = document.getElementById('win');
            const body = document.getElementById('win-body');
            const title = document.getElementById('win-title');
            
            document.querySelectorAll('.task-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-'+app).classList.add('active');

            overlay.style.display = 'flex';
            setTimeout(() => win.classList.add('active'), 10);
            document.getElementById('main-body').classList.add('window-open');

            if(app === 'timer') { title.innerText = "Таймер уроків"; runTimerApp(); }
            else if(app === 'tomorrow') { 
                title.innerText = "На завтра"; 
                let d = new Date().getDay();
                let next = (d >= 5 || d === 0) ? 1 : d + 1;
                body.innerHTML = drawDay(next, false);
            }
            else if(app === 'full') {
                title.innerText = "Повний розклад";
                let h = ""; for(let i=1; i<=5; i++) h += drawDay(i, false);
                body.innerHTML = h;
            }
            else if(app === 'ai') {
                title.innerText = "Quantum Gemini";
                initChat(body);
            }
        }

        function closeApp() {
            clearInterval(timerInterval);
            document.getElementById('win').classList.remove('active');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-body').classList.remove('window-open');
            }, 400);
        }

        function drawDay(dayId, liveMode) {
            const data = schedule[dayId];
            if(!data) return "";
            const now = new Date();
            const curM = now.getHours() * 60 + now.getMinutes();

            let html = `<h3 style="margin: 20px 0 10px; color: var(--win-accent); border-bottom: 2px solid #eee;">${data.name}</h3>`;
            data.lessons.forEach((l, i) => {
                let state = "lesson-future";
                if(liveMode && bells[i]) {
                    const sm = parseInt(bells[i].s.split(':')[0])*60 + parseInt(bells[i].s.split(':')[1]);
                    const em = parseInt(bells[i].e.split(':')[0])*60 + parseInt(bells[i].e.split(':')[1]);
                    if (curM >= em) state = "lesson-passed";
                    else if (curM >= sm && curM < em) state = "lesson-current";
                }
                const homework = localStorage.getItem('hw_'+l) || "Немає завдань";
                html += `
                    <div class="lesson-card ${state}">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${i+1}. ${l}</strong>
                            <small style="color:#888;">${bells[i] ? bells[i].s : ''}</small>
                        </div>
                        <div style="margin-top:8px; font-size:13px; color:#636e72;">
                            ${isAdmin ? `<input type="text" value="${homework==='Немає завдань'?'':homework}" onchange="localStorage.setItem('hw_${l}', this.value)" style="width:100%; padding:4px; border:1px solid #ddd; border-radius:4px;">` : `📝 ${homework}`}
                        </div>
                    </div>`;
            });
            return html;
        }

        let timerInterval;
        function runTimerApp() {
            const body = document.getElementById('win-body');
            function refresh() {
                const now = new Date();
                const day = now.getDay();
                const curM = now.getHours()*60 + now.getMinutes();
                const curS = now.getSeconds();
                let topHtml = "";
                let isOff = (day === 0 || day === 6 || curM > 15*60 || curM < 8*60+30);

                if(!isOff) {
                    let found = false;
                    bells.forEach((b, i) => {
                        const sm = parseInt(b.s.split(':')[0])*60 + parseInt(b.s.split(':')[1]);
                        const em = parseInt(b.e.split(':')[0])*60 + parseInt(b.e.split(':')[1]);
                        if(curM >= sm && curM < em) {
                            topHtml = `<div class="timer-big">${em-curM-1}:${(60-curS).toString().padStart(2,'0')}</div><p style="text-align:center">До кінця ${i+1} уроку</p>`;
                            found = true;
                        } else if(i < bells.length-1) {
                            const nsm = parseInt(bells[i+1].s.split(':')[0])*60 + parseInt(bells[i+1].s.split(':')[1]);
                            if(curM >= em && curM < nsm) {
                                topHtml = `<div class="timer-big">${nsm-curM-1}:${(60-curS).toString().padStart(2,'0')}</div><p style="text-align:center">Перерва!</p>`;
                                found = true;
                            }
                        }
                    });
                    if(!found) topHtml = "<h3>Заняття закінчились</h3>";
                } else {
                    topHtml = "<div class='timer-big' style='font-size:24px;'>Уроків немає</div><p style='text-align:center'>Відпочивай!</p>";
                }
                body.innerHTML = topHtml + "<hr style='margin:20px 0; opacity:0.2;'>" + drawDay(day === 0 || day === 6 ? 1 : day, true);
            }
            refresh();
            timerInterval = setInterval(refresh, 1000);
        }

        // --- AI ENGINE ---
// Додаємо бібліотеку Google AI прямо в скрипт
        const script = document.createElement('script');
        script.type = 'importmap';
        script.innerHTML = JSON.stringify({
            "imports": {
                "@google/generative-ai": "https://esm.run/@google/generative-ai"
            }
        });
        document.head.appendChild(script);

// --- ОНОВЛЕНИЙ AI ENGINE ---
        function initChat(container) {
            container.innerHTML = `
            <div class="chat-container">
            <div class="chat-messages" id="chat-msgs">
            <div class="msg ai">Привіт! Я оновив протокол зв'язку. Спробуй написати зараз.</div>
            </div>
            <div class="typing-indicator" id="ai-typing">Gemini роздумує...</div>
            <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-in" placeholder="Запитання до ШІ...">
            <button class="send-btn" onclick="processChat()">➤</button>
                </div>
        </div>`;
    document.getElementById('chat-in').focus();
        }

async function processChat() {
    const input = document.getElementById('chat-in');
    const msg = input.value.trim();
    if(!msg) return;

    addBubble(msg, 'user');
    input.value = '';
    document.getElementById('ai-typing').style.display = 'block';
    
    const msgsDiv = document.getElementById('chat-msgs');
    msgsDiv.scrollTop = msgsDiv.scrollHeight;

    // Твій ключ
    const API_KEY = "AIzaSyCbM6g_Lgy9VSofcAtPkKTdyIh9T0M5suA"; 

    try {
        // Імпортуємо модуль на льоту
        const { GoogleGenerativeAI } = await import("@google/generative-ai");
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const result = await model.generateContent(`Ти асистент Пилиповицької гімназії. Відповідай коротко і тільки українською. Питання: ${msg}`);
        const response = await result.response;
        const text = response.text();

        document.getElementById('ai-typing').style.display = 'none';
        addBubble(text, 'ai');
    } catch (err) {
        console.error(err);
        document.getElementById('ai-typing').style.display = 'none';
        
        // Перевірка конкретних помилок
        if (err.message.includes('API_KEY_INVALID')) {
            addBubble("❌ Ключ недійсний. Перевір його в Google AI Studio.", 'ai');
        } else if (err.message.includes('SAFETY')) {
            addBubble("⚠️ ШІ заблокував відповідь через цензуру.", 'ai');
        } else {
            addBubble("⚠️ Помилка доступу. Google блокує прямий запит з браузера. Треба або проксі, або Python-сервер.", 'ai');
        }
    }
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
}
    </script>
</body>
</html>
