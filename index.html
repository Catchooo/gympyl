<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School OS Pro</title>
    <style>
        :root {
            --win-bg: #2c3e50;
            --win-accent: #0078d7; /* Windows Blue */
            --taskbar-bg: rgba(0, 0, 0, 0.85);
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Бічна панель завдань (як у Win 10 збоку) */
        .taskbar {
            width: 60px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(10px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 20px;
            z-index: 1000;
            transition: transform 0.5s ease;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* Коли вікно відкрите, панель може трохи зміститися або стиснутися */
        body.window-open .taskbar {
            transform: translateX(-10px);
        }

        .task-icon {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 20px;
            position: relative;
        }

        .task-icon:hover {
            background: rgba(255,255,255,0.1);
        }

        .task-icon.active {
            background: rgba(255,255,255,0.2);
            border-left: 3px solid var(--win-accent);
        }

        /* Вікна додатків */
        .window-overlay {
            position: fixed;
            top: 0; left: 60px; bottom: 0; right: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            justify-content: flex-start;
            align-items: stretch;
            z-index: 500;
        }

        .window-content {
            width: 400px;
            background: #f2f2f2;
            height: 100%;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            transform: translateX(-100%);
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex;
            flex-direction: column;
        }

        .window-content.active { transform: translateX(0); }

        .window-header {
            padding: 20px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .window-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Стилі уроків */
        .lesson-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid var(--win-accent);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .hw-area {
            margin-top: 10px;
            font-size: 13px;
            color: #555;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .hw-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
            font-size: 13px;
            border-radius: 2px;
        }

        .timer-big {
            font-size: 60px;
            text-align: center;
            font-weight: 200;
            color: var(--win-accent);
            margin: 40px 0;
        }

        .close-btn { cursor: pointer; font-size: 20px; opacity: 0.5; }
        .close-btn:hover { opacity: 1; color: red; }

        .admin-btn { margin-top: auto; opacity: 0.5; font-size: 12px; }

    </style>
</head>
<body id="main-body">

    <div class="taskbar">
        <div class="task-icon" title="Скільки до дзвінка" onclick="openApp('timer')">🔔</div>
        <div class="task-icon" title="На завтра" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" title="Весь розклад" onclick="openApp('full')">📚</div>
        
        <div class="task-icon admin-btn" title="Вхід" onclick="login()">🔑</div>
    </div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window-content" id="win" onclick="event.stopPropagation()">
            <div class="window-header">
                <h2 id="win-title">Додаток</h2>
                <span class="close-btn" onclick="closeApp()">✕</span>
            </div>
            <div class="window-body" id="win-body">
                </div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "br.m.airways@gmail.com";
        let isAdmin = false;

        const schedule = {
            1: { name: "Понеділок", lessons: ["Українська мова", "Математика", "Математика", "Українська література", "Мистецтво", "Географія"] },
            2: { name: "Вівторок", lessons: ["Фізкультура", "Англійська мова", "Історія", "Англійська мова", "Зарубіжна література", "Інформатика"] },
            3: { name: "Середа", lessons: ["Українська мова", "Українська література", "Технології", "Технології", "Математика", "Музика", "Географія"] },
            4: { name: "Четвер", lessons: ["Англійська мова", "Українська мова", "Українська мова", "Зарубіжна література", "Фізкультура", "Англійська мова", "Фізкультура"] },
            5: { name: "П'ятниця", lessons: ["Основи здоров'я", "Основи здоров’я", "Математика", "Природа", "Історія", "Математика"] }
        };

        const bells = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:25", e: "11:10"}, {s: "11:30", e: "12:15"},
            {s: "12:25", e: "13:10"}, {s: "13:20", e: "14:05"},
            {s: "14:15", e: "15:00"}
        ];

        function login() {
            const mail = prompt("Введіть email адміністратора:");
            if(mail === ADMIN_EMAIL) {
                isAdmin = true;
                alert("Ви увійшли як староста! Редагування доступне.");
                closeApp(); // Оновити вікно якщо було відкрите
            } else {
                alert("Помилка доступу.");
            }
        }

        function openApp(app) {
            const overlay = document.getElementById('overlay');
            const win = document.getElementById('win');
            const body = document.getElementById('win-body');
            const title = document.getElementById('win-title');
            
            overlay.style.display = 'flex';
            setTimeout(() => win.classList.add('active'), 10);
            document.getElementById('main-body').classList.add('window-open');

            if(app === 'timer') {
                title.innerText = "Таймер дзвінків";
                startTimer();
            } else if(app === 'tomorrow') {
                title.innerText = "Розклад на завтра";
                const d = new Date().getDay();
                const next = (d >= 5 || d === 0) ? 1 : d + 1;
                body.innerHTML = renderDay(next);
            } else if(app === 'full') {
                title.innerText = "Повний тиждень";
                let h = "";
                for(let i=1; i<=5; i++) h += renderDay(i);
                body.innerHTML = h;
            }
        }

        function closeApp() {
            clearInterval(timerTick);
            document.getElementById('win').classList.remove('active');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-body').classList.remove('window-open');
            }, 400);
        }

        function renderDay(id) {
            const data = schedule[id];
            let html = `<h3>${data.name}</h3><br>`;
            data.lessons.forEach((l, i) => {
                const hw = localStorage.getItem('hw_'+l) || "Немає завдань";
                html += `
                <div class="lesson-card">
                    <div><strong>${i+1}. ${l}</strong></div>
                    <div class="hw-area">
                        ${isAdmin 
                          ? `<input class="hw-input" value="${hw === 'Немає завдань' ? '' : hw}" placeholder="Введіть ДЗ..." onchange="localStorage.setItem('hw_${l}', this.value)">`
                          : `<span>📝 ${hw}</span>`
                        }
                    </div>
                </div>`;
            });
            return html + "<hr style='margin:20px 0; opacity:0.2'>";
        }

        let timerTick;
        function startTimer() {
            const body = document.getElementById('win-body');
            body.innerHTML = `<div class="timer-big" id="t-val">00:00</div><p id="t-status" style="text-align:center"></p>`;
            
            timerTick = setInterval(() => {
                const now = new Date();
                const cur = now.getHours() * 60 + now.getMinutes();
                const sec = 60 - now.getSeconds();
                let found = false;

                bells.forEach((b, i) => {
                    const s = b.s.split(':').map(Number);
                    const e = b.e.split(':').map(Number);
                    const sm = s[0]*60 + s[1];
                    const em = e[0]*60 + e[1];

                    if(cur >= sm && cur < em) {
                        document.getElementById('t-val').innerText = `${em - cur - 1}:${sec < 10 ? '0'+sec : sec}`;
                        document.getElementById('t-status').innerText = `Зараз ${i+1} урок`;
                        found = true;
                    }
                });
                if(!found) {
                    document.getElementById('t-val').innerText = "--:--";
                    document.getElementById('t-status').innerText = "Уроки закінчено";
                }
            }, 1000);
        }
    </script>
</body>
</html>
    </script>
</body>
</html>
