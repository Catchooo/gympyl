<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пилиповицька Гімназія</title>
    <style>
        :root {
            --win-accent: #6c5ce7;
            --taskbar-bg: rgba(15, 15, 15, 0.9);
            --window-bg: #f8f9fa;
            --status-passed: #b2bec3;
            --status-future: #2ecc71;
            --status-current: #3498db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: url('https://kokl.ua/wp-content/uploads/2025/10/ostriv-epshtejna-scaled.jpg') center/cover no-repeat fixed;
            height: 100vh; display: flex; overflow: hidden; color: #2d3436;
        }
        .taskbar {
            width: 75px; background: var(--taskbar-bg); backdrop-filter: blur(20px);
            height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 15px; z-index: 1000;
        }
        .task-icon {
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 24px; color: white; transition: 0.3s; border-radius: 12px;
            background: rgba(255,255,255,0.05);
        }
        .task-icon.active { background: var(--win-accent); }
        .desktop { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        body.window-open .desktop { opacity: 0; transform: scale(0.9); }
        .clock { font-size: 80px; font-weight: 800; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .window-overlay { position: fixed; top: 0; left: 75px; bottom: 0; right: 0; background: rgba(0,0,0,0.3); display: none; z-index: 500; backdrop-filter: blur(10px); }
        .window { width: 100%; max-width: 500px; background: var(--window-bg); height: 100%; transform: translateX(-100%); transition: 0.4s; display: flex; flex-direction: column; }
        .window.active { transform: translateX(0); }
        .window-header { padding: 20px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .window-body { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--status-future); position: relative; }
        .card.status-current { border-left-color: var(--status-current); background: #ebf5ff; }
        .card.status-passed { border-left-color: var(--status-passed); opacity: 0.6; }
        .timer-badge { background: var(--win-accent); color: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .hw-input { width: 100%; border: 1px solid #ddd; background: #fff; padding: 5px; border-radius: 5px; font-size: 13px; margin-top: 5px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--win-accent); color: white; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .taskbar { width: 100%; height: 70px; flex-direction: row; justify-content: space-around; padding: 0; }
            .window-overlay { left: 0; bottom: 70px; }
        }
    </style>
</head>
<body>

    <nav class="taskbar">
        <div class="task-icon" id="btn-today" onclick="openApp('today')">🔔</div>
        <div class="task-icon" id="btn-tomorrow" onclick="openApp('tomorrow')">📅</div>
        <div class="task-icon" id="btn-week" onclick="openApp('week')">📖</div>
        <div class="task-icon" id="btn-settings" onclick="openApp('settings')">🏫</div>
        <div class="task-icon" onclick="adminGate()">🔐</div>
    </nav>

    <div class="desktop">
        <div class="clock" id="clock">00:00</div>
        <div id="desktop-info">6 Клас</div>
    </div>

    <div class="window-overlay" id="overlay" onclick="closeApp()">
        <div class="window" id="win-container" onclick="event.stopPropagation()">
            <div class="window-header">
                <h3 id="win-title">Вікно</h3>
                <div style="cursor:pointer; font-size:24px;" onclick="closeApp()">&times;</div>
            </div>
            <div class="window-body" id="win-content"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "br.m.airways@gmail.com";
        let isAdmin = localStorage.getItem('gym_admin') === 'true';
        let currentClass = localStorage.getItem('user_class') || "6";
        const bellSound = new Audio('GO.mp3'); 
        let lastBellMin = null;

        const bellTimes = [
            {s: "08:30", e: "09:15"}, {s: "09:25", e: "10:10"},
            {s: "10:30", e: "11:15"}, {s: "11:25", e: "12:10"},
            {s: "12:20", e: "13:05"}, {s: "13:10", e: "13:55"},
            {s: "14:00", e: "14:45"}, {s: "14:50", e: "15:35"}
        ];

        const allSchedules = {
            "6": {
                1: ["Укр. мова", "Математика", "Математика", "Укр. літ.", "Мистецтво", "Географія"],
                2: ["Фізкультура", "Англ. мова", "Історія", "Англ. мова", "Заруб. літ.", "Інформатика"],
                3: ["Укр. мова", "Укр. літ.", "Технології", "Технології", "Математика", "Музика", "Географія"],
                4: ["Англ. мова", "Укр. мова", "Укр. мова", "Заруб. літ.", "Фізкультура", "Англ. мова", "Фізкультура"],
                5: ["Основи здоров'я", "Математика", "Природа", "Історія", "Математика"]
            }
        };

        function adminGate() {
            if (isAdmin) { if(confirm("Вимкнути адмін-режим?")) { localStorage.removeItem('gym_admin'); location.reload(); } return; }
            if (prompt("Пароль:") === ADMIN_PASS) { localStorage.setItem('gym_admin', 'true'); location.reload(); }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'});
            const curMin = now.getHours() * 60 + now.getMinutes();
            bellTimes.forEach(t => {
                const [sh, sm] = t.s.split(':').map(Number);
                const [eh, em] = t.e.split(':').map(Number);
                if ((curMin === sh*60+sm || curMin === eh*60+em) && lastBellMin !== curMin) {
                    bellSound.play().catch(() => {});
                    lastBellMin = curMin;
                }
            });
            if(document.getElementById('btn-today').classList.contains('active')) renderToday(document.getElementById('win-content'));
        }
        setInterval(updateClock, 1000);

        function openApp(id) {
            const body = document.getElementById('win-content');
            const title = document.getElementById('win-title');
            document.querySelectorAll('.task-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-'+id)?.classList.add('active');
            document.getElementById('overlay').style.display = 'block';
            document.body.classList.add('window-open');
            setTimeout(() => document.getElementById('win-container').classList.add('active'), 10);

            if (id === 'today') { title.innerText = "Сьогодні"; renderToday(body); }
            else if (id === 'tomorrow') { title.innerText = "Завтра"; renderTomorrow(body); }
            else if (id === 'week') { title.innerText = "Весь тиждень"; renderWeek(body); }
            else if (id === 'settings') { title.innerText = "Налаштування"; renderSettings(body); }
        }

        function renderToday(container) {
            const now = new Date();
            const day = now.getDay();
            const sch = allSchedules[currentClass];
            const curMin = now.getHours() * 60 + now.getMinutes();
            const curSec = now.getSeconds();

            if(!sch || !sch[day] || day === 0 || day === 6) {
                container.innerHTML = "<h4>Сьогодні вихідний! 🥳</h4>"; return;
            }

            let timerHtml = "";
            let lessonHtml = sch[day].map((lesson, i) => {
                const [sh, sm] = bellTimes[i].s.split(':').map(Number);
                const [eh, em] = bellTimes[i].e.split(':').map(Number);
                const start = sh*60+sm, end = eh*60+em;

                let status = "status-future";
                if (curMin >= end) status = "status-passed";
                else if (curMin >= start) {
                    status = "status-current";
                    const rem = end - curMin - 1;
                    timerHtml = `<div class="timer-badge">Урок триває: ${rem}хв ${60-curSec}с</div>`;
                } else if (i > 0 && curMin < start && curMin >= (bellTimes[i-1].e.split(':')[0]*60 + Number(bellTimes[i-1].e.split(':')[1]))) {
                    const rem = start - curMin - 1;
                    timerHtml = `<div class="timer-badge" style="background:#2ecc71">Перерва! До уроку: ${rem}хв ${60-curSec}с</div>`;
                }
                return `<div class="card ${status}"><b>${i+1}. ${lesson}</b><br><small>${bellTimes[i].s} - ${bellTimes[i].e}</small></div>`;
            }).join('');

            if(curMin > (bellTimes[sch[day].length-1].e.split(':')[0]*60 + Number(bellTimes[sch[day].length-1].e.split(':')[1]))) {
                timerHtml = `<div class="timer-badge" style="background:#b2bec3">На сьогодні все! ✅</div>`;
            }

            container.innerHTML = timerHtml + lessonHtml;
        }

        function renderTomorrow(container) {
            const now = new Date();
            let nextDay = now.getDay() + 1;
            if (nextDay > 5) nextDay = 1; // Якщо вихідні, показуємо понеділок

            const sch = allSchedules[currentClass];
            const days = ["Неділя", "Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця", "Субота"];
            
            if(!sch || !sch[nextDay]) { container.innerHTML = "Розклад не додано"; return; }

            container.innerHTML = `<h4 style="margin-bottom:15px">На ${days[nextDay]}</h4>` + sch[nextDay].map((l, i) => `
                <div class="card"><b>${i+1}. ${l}</b><br><small>${bellTimes[i].s} - ${bellTimes[i].e}</small></div>
            `).join('');
        }

        function renderWeek(container) {
            const sch = allSchedules[currentClass];
            const names = ["", "Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця"];
            container.innerHTML = Object.keys(sch).map(d => `
                <h4 style="margin:15px 0 5px; color:var(--win-accent)">${names[d]}</h4>
                ${sch[d].map(l => {
                    const hw = localStorage.getItem('hw_'+l) || "Немає завдань";
                    return `<div class="card"><strong>${l}</strong><br>
                        ${isAdmin ? `<input class="hw-input" value="${hw==='Немає завдань'?'':hw}" onchange="localStorage.setItem('hw_${l}', this.value)">` : '<small>ДЗ: '+hw+'</small>'}
                    </div>`;
                }).join('')}
            `).join('');
        }

        function renderSettings(container) {
            container.innerHTML = ["5","6","7","8","9"].map(c => `
                <button class="btn" style="background:${c===currentClass?'#3498db':''}" onclick="localStorage.setItem('user_class', '${c}'); location.reload()">${c} Клас</button>
            `).join('');
        }

        function closeApp() {
            document.getElementById('win-container').classList.remove('active');
            document.body.classList.remove('window-open');
            setTimeout(() => document.getElementById('overlay').style.display='none', 400);
        }
    </script>
</body>
</html>
