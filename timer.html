<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус - Пилиповицька Гімназія</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--window-bg); overflow-y: auto; display: block;">

    <div class="window-header" style="position: sticky; top: 0; z-index: 100;">
        <h2 id="win-title">Поточний статус</h2>
        <a href="main.html" class="close-btn" style="text-decoration: none;">&times;</a>
    </div>

    <div class="window-body">
        <div id="timer-area"></div>
        
        <div id="today-schedule"></div>
    </div>

    <script src="core.js"></script>
    <script>
        const bellSound = new Audio('GO.mp3');
        let lastState = null;

        function updateTimer() {
            const now = new Date();
            const day = now.getDay();
            const curSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            let timerHtml = "";
            let found = false;

            // Якщо вихідний (0 - нд, 6 - сб), показуємо понеділок
            const activeDay = (day === 0 || day === 6) ? 1 : day;

            for(let i=0; i < bellTimes.length; i++) {
                const [sh, sm] = bellTimes[i].s.split(':').map(Number);
                const [eh, em] = bellTimes[i].e.split(':').map(Number);
                const s = sh*3600 + sm*60, e = eh*3600 + em*60;

                // Йде урок
                if(curSec >= s && curSec < e) {
                    if (lastState !== "L" + i) { 
                        bellSound.play().catch(() => {}); 
                        lastState = "L" + i; 
                    }
                    timerHtml = renderTimerUI("До кінця уроку", e - curSec, "#3498db");
                    found = true; break;
                } 
                // Перерва
                else if (i < bellTimes.length - 1) {
                    const [nsh, nsm] = bellTimes[i+1].s.split(':').map(Number);
                    const ns = nsh*3600 + nsm*60;
                    if(curSec >= e && curSec < ns) {
                        timerHtml = renderTimerUI("До початку уроку", ns - curSec, "#2ecc71");
                        lastState = "B" + i;
                        found = true; break;
                    }
                }
            }

            if(!found) {
                timerHtml = renderTimerUI("Уроки закінчились", null, "#7f8c8d");
                lastState = "off"; 
            }

            document.getElementById('timer-area').innerHTML = timerHtml;
            // Рендеримо розклад (функція renderDayUI має бути в core.js)
            document.getElementById('today-schedule').innerHTML = renderDayUI(activeDay, true);
        }

        function renderTimerUI(status, sec, col) {
            let time = "--:--";
            if(sec !== null) {
                const m = Math.floor(sec/60), s = sec%60;
                time = `${m}:${s.toString().padStart(2,'0')}`;
            }
            return `
                <div class="timer-display">
                    <div class="timer-status">${status}</div>
                    <div class="timer-big" style="color:${col}">${time}</div>
                </div>`;
        }

        // Запуск
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
