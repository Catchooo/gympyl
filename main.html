<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пилиповицька Гімназія</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-shell">
    <img src="67.png" id="egg-67" class="easter-egg-67">
    <img src="eps.png" id="egg-full" class="easter-egg-full">

    <nav class="taskbar">
        <a href="timer.html" class="task-icon" id="btn-timer">🔔</a>
        <a href="tomorrow.html" class="task-icon" id="btn-tomorrow">📅</a>
        <a href="week.html" class="task-icon" id="btn-full">📖</a>
        <a href="settings.html" class="task-icon" id="btn-classes">🏫</a>
        <div class="task-icon" style="margin-top:auto; opacity:0.1;" onclick="adminGate()">🔑</div>
    </nav>

    <div class="desktop-greeting">
        <h1 id="school-name">Пилиповицька Гімназія</h1>
        <p id="live-clock">Завантаження...</p>
    </div>

    <div class="footer-credits">
        <span style="font-style: italic;">© 2026 All Rights Reserved. Early - access</span>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=br.m.airways@gmail.com" target="_blank" class="google-mail-btn">
            <img src="google.png" alt="Google">
        </a>
    </div>

    <script src="core.js"></script>
    
    <script>
        // Годинник
        setInterval(() => {
            const now = new Date();
            const clock = document.getElementById('live-clock');
            if(clock) clock.innerText = now.toLocaleTimeString('uk-UA');
        }, 1000);

        // Адмін-панель (через prompt, як було)
        function adminGate() {
            const p = prompt("Пароль адміністратора:");
            if(p === "YRK") { 
                localStorage.setItem('gym_admin', 'true'); 
                location.reload(); 
            } else if (p === "off") {
                localStorage.removeItem('gym_admin');
                location.reload();
            }
        }

        // --- ТВОЯ ПАСХАЛКА ОРІГАМІ ---
        let count = 0;
        let clickTimer;
        const schoolTitle = document.getElementById('school-name');

        schoolTitle.onclick = () => {
            count++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { count = 0; }, 2000);

            if (count === 5) {
                const e67 = document.getElementById('egg-67');
                const ef = document.getElementById('egg-full');
                
                e67.classList.add('active'); 
                
                setTimeout(() => {
                    e67.classList.remove('active');
                    ef.style.display = 'block';
                    
                    setTimeout(() => {
                        ef.classList.add('origami-exit');
                        setTimeout(() => {
                            ef.style.display = 'none';
                            ef.classList.remove('origami-exit');
                        }, 1500); 
                    }, 5000); 
                }, 2000);
                count = 0;
            }
        };
    </script>
</body>
</html>
