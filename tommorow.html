<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завтра - Пилиповицька Гімназія</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--window-bg); overflow-y: auto; display: block;">

    <div class="window-header" style="position: sticky; top: 0; z-index: 100;">
        <h2 id="win-title">Розклад на завтра</h2>
        <a href="main.html" class="close-btn" style="text-decoration: none;">&times;</a>
    </div>

    <div class="window-body">
        <div id="tomorrow-schedule"></div>
    </div>

    <script src="core.js"></script>
    <script>
        function showTomorrow() {
            const now = new Date();
            let tomorrow = now.getDay() + 1;

            // Якщо завтра субота (6) або неділя (0), перемикаємо на понеділок (1)
            if (tomorrow > 5 || tomorrow === 0) {
                tomorrow = 1;
            }

            const container = document.getElementById('tomorrow-schedule');
            
            // Використовуємо твою функцію рендеру з core.js
            // Другий параметр false, бо це не "поточний статус"
            container.innerHTML = renderDayUI(tomorrow, false);
            
            // Додамо підпис, який саме це день тижня
            const daysMap = ["", "Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця"];
            const title = document.querySelector('.window-header h2');
            title.innerText = `Завтра: ${daysMap[tomorrow]}`;
        }

        // Запуск при завантаженні
        showTomorrow();
    </script>
</body>
</html>
